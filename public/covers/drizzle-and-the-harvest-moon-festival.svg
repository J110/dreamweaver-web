<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="da-skyGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="50%" stop-color="#1a103d"/>
      <stop offset="100%" stop-color="#0a0e2a"/>
    </radialGradient>

    <linearGradient id="da-moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ffeb3b"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>

    <linearGradient id="da-hillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>

    <linearGradient id="da-villageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4e342e"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>

    <linearGradient id="da-riverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="50%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>

    <filter id="da-softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="da-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="da-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <radialGradient id="da-vignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.8"/>
    </radialGradient>

    <filter id="da-sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feSpecularLighting result="specOut" in="blur" specularConstant="1" specularExponent="20" lighting-color="#ffeb3b">
        <fePointLight x="0" y="0" z="200"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>

  <style>
    @keyframes da-twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .da-twinkle { animation: da-twinkle 2s infinite ease-in-out; }

    @keyframes da-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .da-bob { animation: da-bob 5s infinite ease-in-out; }

    @keyframes da-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(2deg); }
    }
    .da-float { animation: da-float 7s infinite ease-in-out; }

    @keyframes da-drift {
      0% { transform: translate(0, 0); }
      25% { transform: translate(10px, 5px); }
      50% { transform: translate(5px, 15px); }
      75% { transform: translate(-5px, 10px); }
      100% { transform: translate(0, 0); }
    }
    .da-drift { animation: da-drift 8s infinite ease-in-out; }

    @keyframes da-pulse {
      0%, 100% { opacity: 0.7; filter: url(#da-softGlow); }
      50% { opacity: 1; filter: url(#da-mediumGlow); }
    }
    .da-pulse { animation: da-pulse 4s infinite ease-in-out; }

    @keyframes da-riverFlow {
      0% { transform: translateX(0); }
      100% { transform: translateX(20px); }
    }
    .da-riverFlow { animation: da-riverFlow 12s infinite ease-in-out; }

    @keyframes da-leafFall {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(5px, 10px) rotate(10deg); }
      50% { transform: translate(-3px, 20px) rotate(-5deg); }
      75% { transform: translate(2px, 30px) rotate(5deg); }
      100% { transform: translate(0, 40px) rotate(0deg); }
    }
    .da-leafFall { animation: da-leafFall 6s infinite ease-in-out; }

    @keyframes da-moonPulse {
      0%, 100% { filter: url(#da-mediumGlow); }
      50% { filter: url(#da-strongGlow); }
    }
    .da-moonPulse { animation: da-moonPulse 5s infinite ease-in-out; }
  </style>

  <!-- Layer 1: Sky/Background -->
  <rect width="512" height="512" fill="url(#da-skyGrad)"/>

  <!-- Moon -->
  <g transform="translate(400, 100)">
    <circle cx="0" cy="0" r="40" fill="url(#da-moonGrad)" class="da-moonPulse"/>
    <circle cx="-15" cy="-10" r="8" fill="#0a0e2a"/>
    <circle cx="10" cy="15" r="5" fill="#0a0e2a"/>
  </g>

  <!-- Stars -->
  <g>
    <circle cx="50" cy="80" r="1.5" fill="white" class="da-twinkle"/>
    <circle cx="120" cy="40" r="1.2" fill="white" class="da-twinkle" style="animation-delay: 0.5s"/>
    <circle cx="200" cy="90" r="1.8" fill="white" class="da-twinkle" style="animation-delay: 1s"/>
    <circle cx="350" cy="60" r="1.5" fill="white" class="da-twinkle" style="animation-delay: 1.5s"/>
    <circle cx="450" cy="120" r="1.2" fill="white" class="da-twinkle" style="animation-delay: 2s"/>
    <circle cx="80" cy="200" r="1.5" fill="white" class="da-twinkle" style="animation-delay: 0.3s"/>
    <circle cx="300" cy="180" r="1.8" fill="white" class="da-twinkle" style="animation-delay: 0.8s"/>
    <circle cx="150" cy="250" r="1.2" fill="white" class="da-twinkle" style="animation-delay: 1.2s"/>
  </g>

  <!-- Layer 2: Far Background -->
  <g>
    <!-- Distant hills -->
    <path d="M0,350 Q100,300 200,320 Q300,340 400,310 Q500,330 512,350 L512,512 L0,512 Z" fill="url(#da-hillGrad)" opacity="0.6"/>
    <path d="M0,380 Q150,340 300,360 Q450,380 512,370 L512,512 L0,512 Z" fill="url(#da-hillGrad)" opacity="0.4"/>

    <!-- Distant village lights -->
    <circle cx="150" cy="380" r="3" fill="#ffd700" class="da-pulse" style="animation-delay: 0.2s"/>
    <circle cx="200" cy="370" r="2.5" fill="#ffd700" class="da-pulse" style="animation-delay: 0.4s"/>
    <circle cx="250" cy="375" r="3" fill="#ffd700" class="da-pulse" style="animation-delay: 0.6s"/>
    <circle cx="300" cy="365" r="2.5" fill="#ffd700" class="da-pulse" style="animation-delay: 0.8s"/>
  </g>

  <!-- Layer 3: Mid Background -->
  <g>
    <!-- River -->
    <path d="M0,400 Q100,380 200,390 Q300,400 400,385 Q500,395 512,400 L512,512 L0,512 Z" fill="url(#da-riverGrad)">
      <animate attributeName="d" values="
        M0,400 Q100,380 200,390 Q300,400 400,385 Q500,395 512,400 L512,512 L0,512 Z;
        M0,400 Q100,390 200,380 Q300,410 400,395 Q500,385 512,400 L512,512 L0,512 Z;
        M0,400 Q100,380 200,390 Q300,400 400,385 Q500,395 512,400 L512,512 L0,512 Z"
        dur="12s" repeatCount="indefinite"/>
    </path>

    <!-- Mid-ground hills -->
    <path d="M0,420 Q120,380 250,400 Q380,420 512,400 L512,512 L0,512 Z" fill="#1b5e20"/>
    <path d="M0,450 Q180,410 350,430 Q480,450 512,440 L512,512 L0,512 Z" fill="#0d47a1" opacity="0.3"/>
  </g>

  <!-- Layer 4: Middle Ground -->
  <g>
    <!-- Village -->
    <rect x="120" y="380" width="20" height="30" fill="url(#da-villageGrad)" rx="2"/>
    <rect x="150" y="375" width="18" height="25" fill="url(#da-villageGrad)" rx="2"/>
    <rect x="180" y="385" width="22" height="28" fill="url(#da-villageGrad)" rx="2"/>
    <rect x="210" y="370" width="16" height="32" fill="url(#da-villageGrad)" rx="2"/>

    <!-- Lanterns -->
    <circle cx="130" cy="370" r="3" fill="#ffd700" filter="url(#da-mediumGlow)" class="da-pulse"/>
    <circle cx="160" cy="365" r="2.5" fill="#ffd700" filter="url(#da-mediumGlow)" class="da-pulse" style="animation-delay: 0.3s"/>
    <circle cx="190" cy="375" r="3" fill="#ffd700" filter="url(#da-mediumGlow)" class="da-pulse" style="animation-delay: 0.6s"/>
    <circle cx="220" cy="360" r="2.5" fill="#ffd700" filter="url(#da-mediumGlow)" class="da-pulse" style="animation-delay: 0.9s"/>

    <!-- Trees -->
    <g transform="translate(50, 350)">
      <path d="M0,0 L-10,-40 L-5,-40 L-5,-80 L5,-80 L5,-40 L10,-40 Z" fill="#2e7d32"/>
      <rect x="-3" y="-80" width="6" height="20" fill="#4e342e"/>
    </g>
    <g transform="translate(450, 360)">
      <path d="M0,0 L-12,-45 L-6,-45 L-6,-90 L6,-90 L6,-45 L12,-45 Z" fill="#2e7d32"/>
      <rect x="-4" y="-90" width="8" height="25" fill="#4e342e"/>
    </g>
    <g transform="translate(300, 340)">
      <path d="M0,0 L-8,-35 L-4,-35 L-4,-70 L4,-70 L4,-35 L8,-35 Z" fill="#2e7d32"/>
      <rect x="-2" y="-70" width="4" height="15" fill="#4e342e"/>
    </g>
  </g>

  <!-- Layer 5: Main Character -->
  <g transform="translate(256, 240)">
    <g class="da-bob">
      <!-- Drizzle's body -->
      <ellipse cx="0" cy="0" rx="12" ry="18" fill="#a7d3ff" filter="url(#da-softGlow)"/>

      <!-- Drizzle's face -->
      <circle cx="-5" cy="-5" r="2" fill="white"/>
      <circle cx="-5" cy="-5" r="1" fill="black"/>
      <circle cx="5" cy="-5" r="2" fill="white"/>
      <circle cx="5" cy="-5" r="1" fill="black"/>
      <path d="M-3,-1 Q0,2 3,-1" stroke="black" stroke-width="0.5" fill="none"/>

      <!-- Sparkle effect -->
      <circle cx="-8" cy="-10" r="1.5" fill="#ffeb3b" filter="url(#da-sparkleGlow)" class="da-twinkle" style="animation-delay: 0.2s"/>
      <circle cx="8" cy="-8" r="1.2" fill="#ffeb3b" filter="url(#da-sparkleGlow)" class="da-twinkle" style="animation-delay: 0.4s"/>

      <!-- Water ripples -->
      <circle cx="0" cy="20" r="15" fill="none" stroke="#a7d3ff" stroke-width="1" opacity="0.5" class="da-pulse"/>
      <circle cx="0" cy="20" r="20" fill="none" stroke="#a7d3ff" stroke-width="0.8" opacity="0.3" class="da-pulse" style="animation-delay: 0.5s"/>
    </g>
  </g>

  <!-- Layer 6: Foreground Particles/Sparkles -->
  <g>
    <!-- Floating leaves -->
    <g transform="translate(100, 100)" class="da-leafFall">
      <path d="M0,0 Q5,-10 10,0 Q5,10 0,0" fill="#8bc34a" transform="rotate(-10)"/>
    </g>
    <g transform="translate(400, 120)" class="da-leafFall" style="animation-delay: 0.5s">
      <path d="M0,0 Q5,-10 10,0 Q5,10 0,0" fill="#8bc34a" transform="rotate(15)"/>
    </g>
    <g transform="translate(200, 80)" class="da-leafFall" style="animation-delay: 1s">
      <path d="M0,0 Q5,-10 10,0 Q5,10 0,0" fill="#8bc34a" transform="rotate(-5)"/>
    </g>

    <!-- Sparkles -->
    <circle cx="50" cy="150" r="1.5" fill="#ffeb3b" filter="url(#da-sparkleGlow)" class="da-twinkle da-drift"/>
    <circle cx="450" cy="180" r="1.2" fill="#ffeb3b" filter="url(#da-sparkleGlow)" class="da-twinkle da-drift" style="animation-delay: 0.3s"/>
    <circle cx="300" cy="120" r="1.8" fill="#ffeb3b" filter="url(#da-sparkleGlow)" class="da-twinkle da-drift" style="animation-delay: 0.6s"/>
    <circle cx="150" cy="200" r="1.5" fill="#ffeb3b" filter="url(#da-sparkleGlow)" class="da-twinkle da-drift" style="animation-delay: 0.9s"/>

    <!-- Fireflies -->
    <circle cx="100" cy="250" r="2" fill="#ffd700" filter="url(#da-mediumGlow)" class="da-float"/>
    <circle cx="400" cy="280" r="1.8" fill="#ffd700" filter="url(#da-mediumGlow)" class="da-float" style="animation-delay: 0.5s"/>
    <circle cx="250" cy="300" r="2" fill="#ffd700" filter="url(#da-mediumGlow)" class="da-float" style="animation-delay: 1s"/>
  </g>

  <!-- Layer 7: Vignette Overlay -->
  <rect width="512" height="512" fill="url(#da-vignette)" opacity="0.4"/>
</svg>