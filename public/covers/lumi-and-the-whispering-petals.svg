<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="lt-skyGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="50%" stop-color="#1a103d"/>
      <stop offset="100%" stop-color="#0a0e2a"/>
    </radialGradient>

    <linearGradient id="lt-groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>

    <linearGradient id="lt-moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f8ff"/>
      <stop offset="100%" stop-color="#e0e0ff"/>
    </linearGradient>

    <filter id="lt-softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="lt-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="lt-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <radialGradient id="lt-vignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.8"/>
    </radialGradient>

    <linearGradient id="lt-petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec8b"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>

    <linearGradient id="lt-leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a7c59"/>
      <stop offset="100%" stop-color="#2e5a3a"/>
    </linearGradient>

    <linearGradient id="lt-lumiBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0d2eb"/>
      <stop offset="50%" stop-color="#7fb3d3"/>
      <stop offset="100%" stop-color="#5d9cec"/>
    </linearGradient>

    <linearGradient id="lt-fireflyGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffacd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes lt-twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .lt-twinkle { animation: lt-twinkle 3s ease-in-out infinite; }

    @keyframes lt-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .lt-bob { animation: lt-bob 5s ease-in-out infinite; }

    @keyframes lt-cloudDrift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(12px); }
    }
    .lt-cloudDrift { animation: lt-cloudDrift 7s ease-in-out infinite; }

    @keyframes lt-petalFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(5deg); }
    }
    .lt-petalFloat { animation: lt-petalFloat 6s ease-in-out infinite; }

    @keyframes lt-particleDrift {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translate(20px, 20px); opacity: 0; }
    }
    .lt-particleDrift { animation: lt-particleDrift 8s ease-in-out infinite; }

    @keyframes lt-glowPulse {
      0%, 100% { filter: url(#lt-softGlow); }
      50% { filter: url(#lt-mediumGlow); }
    }
    .lt-glowPulse { animation: lt-glowPulse 4s ease-in-out infinite; }

    @keyframes lt-fireflyFlight {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(15px, -10px); }
      50% { transform: translate(0, 15px); }
      75% { transform: translate(-15px, -5px); }
    }
    .lt-fireflyFlight { animation: lt-fireflyFlight 9s ease-in-out infinite; }

    @keyframes lt-leafSway {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    .lt-leafSway { animation: lt-leafSway 8s ease-in-out infinite; }
  </style>

  <!-- Layer 1: Sky/Background -->
  <rect width="512" height="512" fill="url(#lt-skyGrad)"/>

  <!-- Moon -->
  <g transform="translate(400, 100)">
    <circle cx="0" cy="0" r="40" fill="url(#lt-moonGrad)" filter="url(#lt-softGlow)"/>
    <circle cx="-12" cy="-8" r="8" fill="#e0e0ff" opacity="0.6"/>
    <circle cx="10" cy="12" r="5" fill="#e0e0ff" opacity="0.4"/>
  </g>

  <!-- Distant stars -->
  <g>
    <circle class="lt-twinkle" cx="80" cy="60" r="1.5" fill="white"/>
    <circle class="lt-twinkle" cx="150" cy="40" r="1" fill="white" style="animation-delay: 0.5s"/>
    <circle class="lt-twinkle" cx="220" cy="80" r="1.2" fill="white" style="animation-delay: 1s"/>
    <circle class="lt-twinkle" cx="300" cy="30" r="1.8" fill="white" style="animation-delay: 1.5s"/>
    <circle class="lt-twinkle" cx="380" cy="70" r="1" fill="white" style="animation-delay: 2s"/>
    <circle class="lt-twinkle" cx="450" cy="50" r="1.3" fill="white" style="animation-delay: 2.5s"/>
  </g>

  <!-- Layer 2: Far Background -->
  <g>
    <!-- Distant mountains -->
    <path d="M0,300 Q100,250 200,280 Q300,220 400,260 Q500,200 512,240 L512,512 L0,512 Z" fill="#0a1a2a" opacity="0.7"/>

    <!-- Distant trees -->
    <path d="M50,300 L60,220 L70,300 Z" fill="#0a1a0a" opacity="0.6"/>
    <path d="M150,310 L165,240 L180,310 Z" fill="#0a1a0a" opacity="0.6"/>
    <path d="M350,290 L365,210 L380,290 Z" fill="#0a1a0a" opacity="0.6"/>
    <path d="M450,305 L465,235 L480,305 Z" fill="#0a1a0a" opacity="0.6"/>

    <!-- Clouds -->
    <g class="lt-cloudDrift">
      <path d="M50,120 Q80,100 110,120 Q140,100 170,120 Q200,100 230,120 L230,140 Q200,120 170,140 Q140,120 110,140 Q80,120 50,140 Z" fill="white" opacity="0.6"/>
    </g>
    <g class="lt-cloudDrift" style="animation-delay: 1s">
      <path d="M350,100 Q380,80 410,100 Q440,80 470,100 Q500,80 530,100 L530,120 Q500,100 470,120 Q440,100 410,120 Q380,100 350,120 Z" fill="white" opacity="0.6"/>
    </g>
  </g>

  <!-- Layer 3: Mid Background -->
  <g>
    <!-- Greenhouse structure -->
    <rect x="100" y="280" width="312" height="180" rx="20" fill="#2a3a2a" opacity="0.8"/>
    <rect x="110" y="290" width="292" height="160" rx="15" fill="#1a2a1a" opacity="0.9"/>

    <!-- Greenhouse glass panels -->
    <g opacity="0.6">
      <rect x="120" y="300" width="80" height="60" fill="#a0d8f3" rx="5"/>
      <rect x="210" y="300" width="80" height="60" fill="#a0d8f3" rx="5"/>
      <rect x="300" y="300" width="80" height="60" fill="#a0d8f3" rx="5"/>
      <rect x="120" y="370" width="80" height="60" fill="#a0d8f3" rx="5"/>
      <rect x="210" y="370" width="80" height="60" fill="#a0d8f3" rx="5"/>
      <rect x="300" y="370" width="80" height="60" fill="#a0d8f3" rx="5"/>
    </g>

    <!-- Greenhouse roof -->
    <path d="M100,280 L256,200 L412,280 Z" fill="#3a4a3a" opacity="0.9"/>
    <path d="M110,290 L256,215 L402,290 Z" fill="#2a3a2a" opacity="0.95"/>

    <!-- Distant plants -->
    <g opacity="0.7">
      <path d="M150,400 Q160,380 170,400 Q180,380 190,400" stroke="#4a7c59" stroke-width="3" fill="none"/>
      <circle cx="170" cy="380" r="8" fill="#6a9c79"/>
      <path d="M350,390 Q360,370 370,390 Q380,370 390,390" stroke="#4a7c59" stroke-width="3" fill="none"/>
      <circle cx="370" cy="370" r="10" fill="#6a9c79"/>
    </g>
  </g>

  <!-- Layer 4: Middle Ground -->
  <g>
    <!-- Ground -->
    <rect x="0" y="460" width="512" height="52" fill="url(#lt-groundGrad)"/>

    <!-- Path to greenhouse -->
    <path d="M200,460 Q256,480 312,460" stroke="#3a4a3a" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Garden plants -->
    <g>
      <!-- Left side plants -->
      <g transform="translate(120, 420)" class="lt-leafSway">
        <path d="M0,0 Q10,-20 20,0 Q10,20 0,0" fill="url(#lt-leafGrad)"/>
        <path d="M15,0 Q25,-15 35,0 Q25,15 15,0" fill="url(#lt-leafGrad)"/>
        <path d="M30,0 Q40,-25 50,0 Q40,25 30,0" fill="url(#lt-leafGrad)"/>
      </g>

      <!-- Right side plants -->
      <g transform="translate(380, 410)" class="lt-leafSway" style="animation-delay: 1s">
        <path d="M0,0 Q-10,-20 -20,0 Q-10,20 0,0" fill="url(#lt-leafGrad)"/>
        <path d="M-15,0 Q-25,-15 -35,0 Q-25,15 -15,0" fill="url(#lt-leafGrad)"/>
      </g>

      <!-- Whispering petals -->
      <g transform="translate(200, 380)">
        <g class="lt-petalFloat">
          <ellipse cx="0" cy="0" rx="12" ry="8" fill="url(#lt-petalGrad)" filter="url(#lt-softGlow)" transform="rotate(-20)"/>
        </g>
        <g class="lt-petalFloat" style="animation-delay: 0.5s">
          <ellipse cx="25" cy="-10" rx="10" ry="7" fill="url(#lt-petalGrad)" filter="url(#lt-softGlow)" transform="rotate(15)"/>
        </g>
        <g class="lt-petalFloat" style="animation-delay: 1s">
          <ellipse cx="15" cy="-25" rx="9" ry="6" fill="url(#lt-petalGrad)" filter="url(#lt-softGlow)" transform="rotate(-5)"/>
        </g>
        <g class="lt-petalFloat" style="animation-delay: 1.5s">
          <ellipse cx="-20" cy="-15" rx="11" ry="7" fill="url(#lt-petalGrad)" filter="url(#lt-softGlow)" transform="rotate(25)"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Layer 5: Main Character -->
  <g transform="translate(256, 240)">
    <g class="lt-bob">
      <!-- Lumi's body -->
      <rect x="-30" y="20" width="60" height="80" rx="15" fill="url(#lt-lumiBodyGrad)" filter="url(#lt-softGlow)"/>

      <!-- Lumi's head -->
      <circle cx="0" cy="0" r="25" fill="url(#lt-lumiBodyGrad)"/>

      <!-- Lumi's eyes -->
      <circle cx="-10" cy="-5" r="4" fill="white"/>
      <circle cx="-10" cy="-5" r="2" fill="#3a3a5a"/>
      <circle cx="10" cy="-5" r="4" fill="white"/>
      <circle cx="10" cy="-5" r="2" fill="#3a3a5a"/>

      <!-- Lumi's mouth -->
      <path d="M-5,10 Q0,15 5,10" stroke="#3a3a5a" stroke-width="2" fill="none"/>

      <!-- Lumi's antennae -->
      <path d="M-8,-20 Q-12,-30 -15,-25" stroke="#a0d2eb" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M8,-20 Q12,-30 15,-25" stroke="#a0d2eb" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="-15" cy="-25" r="3" fill="#ffd700" filter="url(#lt-mediumGlow)"/>
      <circle cx="15" cy="-25" r="3" fill="#ffd700" filter="url(#lt-mediumGlow)"/>

      <!-- Lumi's arms -->
      <rect x="-45" y="30" width="15" height="40" rx="7" fill="url(#lt-lumiBodyGrad)"/>
      <rect x="30" y="30" width="15" height="40" rx="7" fill="url(#lt-lumiBodyGrad)"/>

      <!-- Lumi's hands -->
      <circle cx="-45" cy="75" r="8" fill="url(#lt-lumiBodyGrad)"/>
      <circle cx="30" cy="75" r="8" fill="url(#lt-lumiBodyGrad)"/>

      <!-- Watering can -->
      <path d="M-50,60 L-60,60 L-60,40 L-50,30 L-40,40 L-40,60 Z" fill="#7fb3d3"/>
      <path d="M-60,40 L-50,30" stroke="#5d9cec" stroke-width="2" stroke-linecap="round"/>

      <!-- Firefly friend -->
      <g transform="translate(40, -40)" class="lt-fireflyFlight">
        <circle cx="0" cy="0" r="6" fill="url(#lt-fireflyGlow)" filter="url(#lt-strongGlow)"/>
        <ellipse cx="0" cy="8" rx="3" ry="2" fill="#3a3a5a"/>
        <path d="M-3,6 L0,10 L3,6" stroke="#3a3a5a" stroke-width="1" fill="none"/>
      </g>
    </g>
  </g>

  <!-- Layer 6: Foreground Particles/Sparkles -->
  <g>
    <!-- Floating sparkles -->
    <g>
      <circle class="lt-particleDrift" cx="100" cy="150" r="2" fill="white" style="animation-delay: 0s"/>
      <circle class="lt-particleDrift" cx="400" cy="100" r="2.5" fill="#ffd700" style="animation-delay: 0.5s"/>
      <circle class="lt-particleDrift" cx="200" cy="200" r="1.5" fill="white" style="animation-delay: 1s"/>
      <circle class="lt-particleDrift" cx="350" cy="180" r="2" fill="#ffec8b" style="animation-delay: 1.5s"/>
      <circle class="lt-particleDrift" cx="150" cy="250" r="1.8" fill="white" style="animation-delay: 2s"/>
      <circle class="lt-particleDrift" cx="300" cy="220" r="2.2" fill="#ffd700" style="animation-delay: 2.5s"/>
    </g>

    <!-- Glowing particles near Lumi -->
    <g>
      <circle class="lt-glowPulse" cx="220" cy="200" r="3" fill="#ffd700" style="animation-delay: 0s"/>
      <circle class="lt-glowPulse" cx="290" cy="190" r="2.5" fill="#ffec8b" style="animation-delay: 0.5s"/>
      <circle class="lt-glowPulse" cx="240" cy="250" r="2" fill="#fffacd" style="animation-delay: 1s"/>
      <circle class="lt-glowPulse" cx="270" cy="230" r="3" fill="#ffd700" style="animation-delay: 1.5s"/>
    </g>

    <!-- Additional fireflies -->
    <g transform="translate(150, 300)" class="lt-fireflyFlight" style="animation-delay: 2s">
      <circle cx="0" cy="0" r="4" fill="url(#lt-fireflyGlow)" filter="url(#lt-mediumGlow)"/>
    </g>
    <g transform="translate(350, 280)" class="lt-fireflyFlight" style="animation-delay: 3s">
      <circle cx="0" cy="0" r="4" fill="url(#lt-fireflyGlow)" filter="url(#lt-mediumGlow)"/>
    </g>
  </g>

  <!-- Layer 7: Vignette Overlay -->
  <rect width="512" height="512" fill="url(#lt-vignette)" opacity="0.4"/>
</svg>