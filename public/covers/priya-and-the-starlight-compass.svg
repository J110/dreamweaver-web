<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <radialGradient id="pt-skyGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="50%" stop-color="#1a103d"/>
      <stop offset="100%" stop-color="#0a0e2a"/>
    </radialGradient>

    <linearGradient id="pt-mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a2e5a"/>
      <stop offset="100%" stop-color="#1a103d"/>
    </linearGradient>

    <linearGradient id="pt-pathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0.6"/>
    </linearGradient>

    <radialGradient id="pt-moonGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#f8f8ff"/>
      <stop offset="100%" stop-color="#d4d4e8"/>
    </radialGradient>

    <radialGradient id="pt-starGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </radialGradient>

    <radialGradient id="pt-vignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.8"/>
    </radialGradient>

    <radialGradient id="pt-glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="pt-softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="pt-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="pt-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="pt-twinkleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feSpecularLighting result="specOut" in="blur" specularConstant="1" specularExponent="20" lighting-color="#ffd700">
        <fePointLight x="0" y="0" z="200"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>

  <style>
    @keyframes pt-starTwinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .pt-starTwinkle {
      animation: pt-starTwinkle 2s ease-in-out infinite;
    }

    @keyframes pt-sparkleTwinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .pt-sparkleTwinkle {
      animation: pt-sparkleTwinkle 3s ease-in-out infinite;
    }

    @keyframes pt-characterBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .pt-characterBob {
      animation: pt-characterBob 5s ease-in-out infinite;
    }

    @keyframes pt-cloudDrift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(20px); }
    }
    .pt-cloudDrift {
      animation: pt-cloudDrift 7s ease-in-out infinite;
    }

    @keyframes pt-particleDrift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(10px, 20px) rotate(360deg); }
    }
    .pt-particleDrift {
      animation: pt-particleDrift 8s ease-in-out infinite;
    }

    @keyframes pt-glowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .pt-glowPulse {
      animation: pt-glowPulse 4s ease-in-out infinite;
    }

    @keyframes pt-compassSpin {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(10deg); }
    }
    .pt-compassSpin {
      animation: pt-compassSpin 6s ease-in-out infinite;
    }

    @keyframes pt-floatUp {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .pt-floatUp {
      animation: pt-floatUp 4s ease-in-out infinite;
    }
  </style>

  <!-- Layer 1: Sky/Background -->
  <rect width="512" height="512" fill="url(#pt-skyGrad)"/>

  <!-- Distant stars -->
  <g>
    <circle cx="50" cy="80" r="1" fill="white" class="pt-starTwinkle" style="animation-delay: 0.1s"/>
    <circle cx="120" cy="40" r="1.2" fill="white" class="pt-starTwinkle" style="animation-delay: 0.3s"/>
    <circle cx="200" cy="70" r="0.8" fill="white" class="pt-starTwinkle" style="animation-delay: 0.5s"/>
    <circle cx="300" cy="30" r="1.5" fill="white" class="pt-starTwinkle" style="animation-delay: 0.7s"/>
    <circle cx="400" cy="90" r="1" fill="white" class="pt-starTwinkle" style="animation-delay: 0.9s"/>
    <circle cx="450" cy="50" r="1.2" fill="white" class="pt-starTwinkle" style="animation-delay: 1.1s"/>
    <circle cx="150" cy="120" r="0.7" fill="white" class="pt-starTwinkle" style="animation-delay: 1.3s"/>
    <circle cx="350" cy="150" r="1.3" fill="white" class="pt-starTwinkle" style="animation-delay: 1.5s"/>
    <circle cx="80" cy="200" r="1" fill="white" class="pt-starTwinkle" style="animation-delay: 1.7s"/>
    <circle cx="250" cy="180" r="0.9" fill="white" class="pt-starTwinkle" style="animation-delay: 1.9s"/>
    <circle cx="420" cy="220" r="1.1" fill="white" class="pt-starTwinkle" style="animation-delay: 2.1s"/>
  </g>

  <!-- Layer 2: Far Background -->
  <g>
    <!-- Distant mountains -->
    <path d="M0,350 Q100,250 200,300 T400,280 T512,320 L512,512 L0,512 Z" fill="url(#pt-mountainGrad)"/>

    <!-- Moon -->
    <circle cx="400" cy="100" r="40" fill="url(#pt-moonGrad)" filter="url(#pt-softGlow)"/>

    <!-- Clouds -->
    <g transform="translate(50, 150)">
      <g class="pt-cloudDrift">
        <path d="M0,0 Q20,20 40,0 Q60,-10 80,0 Q100,10 120,0 L120,30 Q100,40 80,30 Q60,50 40,30 Q20,40 0,30 Z" fill="white" opacity="0.6"/>
      </g>
    </g>
    <g transform="translate(300, 100)">
      <g class="pt-cloudDrift" style="animation-delay: 1s">
        <path d="M0,0 Q30,15 60,0 Q90,-5 120,0 Q150,10 180,0 L180,20 Q150,30 120,20 Q90,40 60,20 Q30,30 0,20 Z" fill="white" opacity="0.5"/>
      </g>
    </g>
  </g>

  <!-- Layer 3: Mid Background -->
  <g>
    <!-- Celestial path -->
    <path d="M100,400 Q256,350 400,400" stroke="url(#pt-pathGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Floating islands -->
    <g transform="translate(150, 250)">
      <path d="M0,0 Q20,-20 40,0 Q60,-10 80,0 Q100,10 120,0 L120,30 Q100,40 80,30 Q60,50 40,30 Q20,40 0,30 Z" fill="#3a2e5a" filter="url(#pt-softGlow)"/>
      <circle cx="60" cy="15" r="8" fill="#ffd700" filter="url(#pt-mediumGlow)"/>
    </g>

    <g transform="translate(350, 200)">
      <path d="M0,0 Q15,-15 30,0 Q45,-8 60,0 Q75,8 90,0 L90,25 Q75,35 60,25 Q45,40 30,25 Q15,35 0,25 Z" fill="#3a2e5a" filter="url(#pt-softGlow)"/>
      <circle cx="45" cy="12" r="6" fill="#ff6b6b" filter="url(#pt-mediumGlow)"/>
    </g>
  </g>

  <!-- Layer 4: Middle Ground -->
  <g>
    <!-- Village silhouette -->
    <path d="M50,450 Q100,420 150,440 Q200,430 250,450 L250,512 L50,512 Z" fill="#2a1e4a"/>
    <rect x="80" y="430" width="8" height="20" fill="#4a3e6a"/>
    <rect x="120" y="425" width="10" height="25" fill="#4a3e6a"/>
    <rect x="160" y="435" width="6" height="15" fill="#4a3e6a"/>

    <!-- Lanterns -->
    <g transform="translate(100, 400)">
      <circle cx="0" cy="0" r="8" fill="#ffd700" filter="url(#pt-mediumGlow)"/>
      <path d="M-5,-5 L0,-15 L5,-5 Z" fill="#ff6b6b"/>
    </g>
    <g transform="translate(200, 390)">
      <circle cx="0" cy="0" r="6" fill="#ff6b6b" filter="url(#pt-mediumGlow)"/>
      <path d="M-4,-4 L0,-12 L4,-4 Z" fill="#ffd700"/>
    </g>
  </g>

  <!-- Layer 5: Main Character -->
  <g transform="translate(256, 240)">
    <g class="pt-characterBob">
      <!-- Priya's body -->
      <path d="M-20,-30 Q-10,-50 0,-30 Q10,-50 20,-30 Q20,20 0,30 Q-20,20 -20,-30 Z" fill="#ffd700" opacity="0.9"/>

      <!-- Dress -->
      <path d="M-25,0 Q0,-20 25,0 Q25,40 0,35 Q-25,40 -25,0 Z" fill="#ff6b6b"/>

      <!-- Hair -->
      <path d="M-20,-30 Q-30,-40 -25,-50 Q-15,-60 0,-55 Q15,-60 25,-50 Q30,-40 20,-30 Q20,-10 0,-15 Q-20,-10 -20,-30 Z" fill="#3a2e5a"/>

      <!-- Face -->
      <circle cx="0" cy="-20" r="8" fill="#f8d4c8"/>
      <circle cx="-4" cy="-22" r="1.5" fill="#3a2e5a"/>
      <circle cx="4" cy="-22" r="1.5" fill="#3a2e5a"/>
      <path d="M-3,-16 Q0,-14 3,-16" stroke="#3a2e5a" stroke-width="1" fill="none"/>

      <!-- Arms -->
      <path d="M-25,-10 Q-40,0 -30,15" stroke="#f8d4c8" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M25,-10 Q40,0 30,15" stroke="#f8d4c8" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- Compass -->
      <g transform="translate(-15, 10)" class="pt-compassSpin">
        <circle cx="0" cy="0" r="12" fill="#ffd700" filter="url(#pt-strongGlow)"/>
        <path d="M0,-8 L0,8 M-8,0 L8,0" stroke="#3a2e5a" stroke-width="2" stroke-linecap="round"/>
        <path d="M0,0 L5,-5" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round"/>
      </g>

      <!-- Starlight glow -->
      <circle cx="0" cy="0" r="40" fill="url(#pt-glowGrad)" opacity="0.3" class="pt-glowPulse"/>
    </g>
  </g>

  <!-- Layer 6: Foreground Particles/Sparkles -->
  <g>
    <!-- Sparkles -->
    <g transform="translate(100, 100)">
      <g class="pt-sparkleTwinkle" style="animation-delay: 0.2s">
        <path d="M0,0 L5,5 L0,10 L-5,5 Z" fill="#ffffff" filter="url(#pt-twinkleGlow)"/>
      </g>
    </g>
    <g transform="translate(350, 80)">
      <g class="pt-sparkleTwinkle" style="animation-delay: 0.5s">
        <path d="M0,0 L4,4 L0,8 L-4,4 Z" fill="#ffd700" filter="url(#pt-twinkleGlow)"/>
      </g>
    </g>
    <g transform="translate(200, 50)">
      <g class="pt-sparkleTwinkle" style="animation-delay: 0.8s">
        <path d="M0,0 L6,6 L0,12 L-6,6 Z" fill="#ff6b6b" filter="url(#pt-twinkleGlow)"/>
      </g>
    </g>
    <g transform="translate(400, 200)">
      <g class="pt-sparkleTwinkle" style="animation-delay: 1.1s">
        <path d="M0,0 L3,3 L0,6 L-3,3 Z" fill="#ffffff" filter="url(#pt-twinkleGlow)"/>
      </g>
    </g>

    <!-- Floating particles -->
    <g transform="translate(150, 300)">
      <g class="pt-particleDrift" style="animation-delay: 0.3s">
        <circle cx="0" cy="0" r="2" fill="#ffd700" filter="url(#pt-softGlow)"/>
      </g>
    </g>
    <g transform="translate(300, 250)">
      <g class="pt-particleDrift" style="animation-delay: 0.6s">
        <circle cx="0" cy="0" r="1.5" fill="#ff6b6b" filter="url(#pt-softGlow)"/>
      </g>
    </g>
    <g transform="translate(250, 150)">
      <g class="pt-particleDrift" style="animation-delay: 0.9s">
        <circle cx="0" cy="0" r="2.5" fill="#ffffff" filter="url(#pt-softGlow)"/>
      </g>
    </g>
    <g transform="translate(400, 350)">
      <g class="pt-particleDrift" style="animation-delay: 1.2s">
        <circle cx="0" cy="0" r="1.8" fill="#ffd700" filter="url(#pt-softGlow)"/>
      </g>
    </g>

    <!-- Fireflies -->
    <g transform="translate(120, 350)">
      <g class="pt-floatUp">
        <circle cx="0" cy="0" r="3" fill="#ffd700" filter="url(#pt-mediumGlow)"/>
      </g>
    </g>
    <g transform="translate(380, 300)">
      <g class="pt-floatUp" style="animation-delay: 1s">
        <circle cx="0" cy="0" r="2.5" fill="#ff6b6b" filter="url(#pt-mediumGlow)"/>
      </g>
    </g>
  </g>

  <!-- Layer 7: Vignette Overlay -->
  <rect width="512" height="512" fill="url(#pt-vignette)" opacity="0.4"/>
</svg>