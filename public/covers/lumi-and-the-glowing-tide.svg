<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
    <!-- Gradients -->
    <radialGradient id="lu-skyGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
        <stop offset="0%" stop-color="#0a1a3a"/>
        <stop offset="50%" stop-color="#1a2a5a"/>
        <stop offset="100%" stop-color="#0a0a2a"/>
    </radialGradient>

    <linearGradient id="lu-oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#1a3a7a"/>
        <stop offset="50%" stop-color="#0a2a5a"/>
        <stop offset="100%" stop-color="#05153a"/>
    </linearGradient>

    <linearGradient id="lu-sandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#f5e7b3"/>
        <stop offset="100%" stop-color="#d7c78a"/>
    </linearGradient>

    <radialGradient id="lu-lumiGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
        <stop offset="0%" stop-color="#ffec8b" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="lu-starGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
        <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="lu-sparkleGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="lu-vignette" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
        <stop offset="0%" stop-color="black" stop-opacity="0"/>
        <stop offset="100%" stop-color="black" stop-opacity="0.8"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="lu-softGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="lu-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="lu-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="lu-twinkleGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
        <feSpecularLighting result="specOut" in="blur" specularConstant="1" specularExponent="20" lighting-color="#ffd700">
            <fePointLight x="0" y="0" z="200"/>
        </feSpecularLighting>
        <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
</defs>

<style>
    @keyframes lu-twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
    }
    .lu-twinkle { animation: lu-twinkle 3s ease-in-out infinite; }

    @keyframes lu-bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    .lu-bob { animation: lu-bob 5s ease-in-out infinite; }

    @keyframes lu-wave {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(5px); }
    }
    .lu-wave { animation: lu-wave 7s ease-in-out infinite; }

    @keyframes lu-drift {
        0% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(10px, 5px) rotate(5deg); }
        50% { transform: translate(5px, 10px) rotate(0deg); }
        75% { transform: translate(-5px, 5px) rotate(-5deg); }
        100% { transform: translate(0, 0) rotate(0deg); }
    }
    .lu-drift { animation: lu-drift 8s ease-in-out infinite; }

    @keyframes lu-pulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
    }
    .lu-pulse { animation: lu-pulse 4s ease-in-out infinite; }

    @keyframes lu-float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(2deg); }
    }
    .lu-float { animation: lu-float 6s ease-in-out infinite; }

    @keyframes lu-sway {
        0%, 100% { transform: rotate(-2deg); }
        50% { transform: rotate(2deg); }
    }
    .lu-sway { animation: lu-sway 9s ease-in-out infinite; }
</style>

<!-- Layer 1: Sky/Background -->
<rect width="512" height="512" fill="url(#lu-skyGrad)"/>

<!-- Stars -->
<g>
    <circle cx="50" cy="80" r="1.5" fill="white" filter="url(#lu-twinkleGlow)" class="lu-twinkle"/>
    <circle cx="120" cy="40" r="1" fill="white" filter="url(#lu-twinkleGlow)" class="lu-twinkle"/>
    <circle cx="200" cy="90" r="1.2" fill="white" filter="url(#lu-twinkleGlow)" class="lu-twinkle"/>
    <circle cx="300" cy="30" r="1.5" fill="white" filter="url(#lu-twinkleGlow)" class="lu-twinkle"/>
    <circle cx="400" cy="70" r="1" fill="white" filter="url(#lu-twinkleGlow)" class="lu-twinkle"/>
    <circle cx="450" cy="120" r="1.3" fill="white" filter="url(#lu-twinkleGlow)" class="lu-twinkle"/>
    <circle cx="80" cy="180" r="1" fill="white" filter="url(#lu-twinkleGlow)" class="lu-twinkle"/>
    <circle cx="350" cy="150" r="1.2" fill="white" filter="url(#lu-twinkleGlow)" class="lu-twinkle"/>
    <circle cx="250" cy="200" r="1.5" fill="white" filter="url(#lu-twinkleGlow)" class="lu-twinkle"/>
    <circle cx="150" cy="250" r="1" fill="white" filter="url(#lu-twinkleGlow)" class="lu-twinkle"/>
</g>

<!-- Layer 2: Far Background -->
<rect y="300" width="512" height="212" fill="url(#lu-oceanGrad)"/>

<!-- Distant jellyfish -->
<g transform="translate(100, 350)">
    <g class="lu-drift">
        <ellipse cx="0" cy="0" rx="8" ry="12" fill="#a0c4ff" opacity="0.6"/>
        <path d="M-5,-5 Q0,-15 5,-5" stroke="#a0c4ff" stroke-width="1" fill="none"/>
        <path d="M-3,-3 Q0,-10 3,-3" stroke="#a0c4ff" stroke-width="1" fill="none"/>
    </g>
</g>

<g transform="translate(400, 380)">
    <g class="lu-drift">
        <ellipse cx="0" cy="0" rx="6" ry="9" fill="#a0c4ff" opacity="0.5"/>
        <path d="M-4,-4 Q0,-12 4,-4" stroke="#a0c4ff" stroke-width="1" fill="none"/>
    </g>
</g>

<!-- Layer 3: Mid Background -->
<rect y="400" width="512" height="112" fill="url(#lu-sandGrad)"/>

<!-- Seaweed -->
<g transform="translate(50, 420)">
    <g class="lu-sway">
        <path d="M0,0 Q10,-20 5,-40 Q0,-60 -5,-40 Q-10,-20 0,0" stroke="#5a8a5a" stroke-width="3" fill="none"/>
        <path d="M0,0 Q8,-15 4,-30 Q0,-45 -4,-30 Q-8,-15 0,0" stroke="#7a9a7a" stroke-width="2" fill="none"/>
    </g>
</g>

<g transform="translate(150, 430)">
    <g class="lu-sway">
        <path d="M0,0 Q15,-30 8,-60 Q0,-80 -8,-60 Q-15,-30 0,0" stroke="#5a8a5a" stroke-width="3" fill="none"/>
        <path d="M0,0 Q12,-25 6,-50 Q0,-70 -6,-50 Q-12,-25 0,0" stroke="#7a9a7a" stroke-width="2" fill="none"/>
    </g>
</g>

<g transform="translate(350, 425)">
    <g class="lu-sway">
        <path d="M0,0 Q12,-25 6,-50 Q0,-70 -6,-50 Q-12,-25 0,0" stroke="#5a8a5a" stroke-width="3" fill="none"/>
        <path d="M0,0 Q10,-20 5,-40 Q0,-60 -5,-40 Q-10,-20 0,0" stroke="#7a9a7a" stroke-width="2" fill="none"/>
    </g>
</g>

<!-- Layer 4: Middle Ground -->
<!-- Coral -->
<g transform="translate(100, 450)">
    <path d="M0,0 L10,-20 L20,0 L15,10 L5,10 Z" fill="#ff9a8b" filter="url(#lu-softGlow)"/>
    <path d="M5,10 L8,5 L12,10" stroke="#ff7a6b" stroke-width="1" fill="none"/>
</g>

<g transform="translate(400, 460)">
    <path d="M0,0 L15,-30 L30,0 L25,15 L5,15 Z" fill="#ffb366" filter="url(#lu-softGlow)"/>
    <path d="M8,15 L12,8 L18,15" stroke="#ff9a40" stroke-width="1" fill="none"/>
</g>

<!-- Bubbles -->
<g transform="translate(200, 400)">
    <g class="lu-float">
        <circle cx="0" cy="0" r="3" fill="white" opacity="0.6" filter="url(#lu-softGlow)"/>
    </g>
</g>

<g transform="translate(300, 380)">
    <g class="lu-float">
        <circle cx="0" cy="0" r="2" fill="white" opacity="0.7"/>
    </g>
</g>

<g transform="translate(150, 360)">
    <g class="lu-float">
        <circle cx="0" cy="0" r="4" fill="white" opacity="0.5"/>
    </g>
</g>

<!-- Layer 5: Main Character -->
<g transform="translate(256, 240)">
    <g class="lu-bob">
        <!-- Lumi's glow -->
        <circle cx="0" cy="0" r="40" fill="url(#lu-lumiGlow)" filter="url(#lu-strongGlow)" class="lu-pulse"/>

        <!-- Lumi's body -->
        <ellipse cx="0" cy="0" rx="15" ry="20" fill="#ffec8b" filter="url(#lu-mediumGlow)"/>

        <!-- Lumi's tentacles -->
        <path d="M-8,-10 Q-15,-30 -10,-50" stroke="#ffd700" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M-4,-10 Q-8,-30 -5,-50" stroke="#ffec8b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M0,-10 Q0,-35 0,-50" stroke="#ffd700" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M4,-10 Q8,-30 5,-50" stroke="#ffec8b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M8,-10 Q15,-30 10,-50" stroke="#ffd700" stroke-width="2" fill="none" stroke-linecap="round"/>

        <!-- Lumi's face -->
        <circle cx="-4" cy="-3" r="1.5" fill="#5a3a2a"/>
        <circle cx="4" cy="-3" r="1.5" fill="#5a3a2a"/>
        <path d="M-2,2 Q0,4 2,2" stroke="#5a3a2a" stroke-width="1" fill="none"/>
    </g>
</g>

<!-- Layer 6: Foreground Particles/Sparkles -->
<g>
    <!-- Sparkles around Lumi -->
    <g transform="translate(220, 200)">
        <g class="lu-drift">
            <circle cx="0" cy="0" r="1.5" fill="white" filter="url(#lu-sparkleGlow)" class="lu-twinkle"/>
        </g>
    </g>

    <g transform="translate(280, 180)">
        <g class="lu-drift">
            <circle cx="0" cy="0" r="1.2" fill="white" filter="url(#lu-sparkleGlow)" class="lu-twinkle"/>
        </g>
    </g>

    <g transform="translate(240, 280)">
        <g class="lu-drift">
            <circle cx="0" cy="0" r="1.8" fill="white" filter="url(#lu-sparkleGlow)" class="lu-twinkle"/>
        </g>
    </g>

    <g transform="translate(300, 250)">
        <g class="lu-drift">
            <circle cx="0" cy="0" r="1" fill="white" filter="url(#lu-sparkleGlow)" class="lu-twinkle"/>
        </g>
    </g>

    <!-- Floating particles -->
    <g transform="translate(100, 150)">
        <g class="lu-float">
            <circle cx="0" cy="0" r="1" fill="white" opacity="0.8"/>
        </g>
    </g>

    <g transform="translate(400, 200)">
        <g class="lu-float">
            <circle cx="0" cy="0" r="1.2" fill="white" opacity="0.7"/>
        </g>
    </g>

    <g transform="translate(150, 300)">
        <g class="lu-float">
            <circle cx="0" cy="0" r="1.5" fill="white" opacity="0.6"/>
        </g>
    </g>
</g>

<!-- Layer 7: Vignette Overlay -->
<rect width="512" height="512" fill="url(#lu-vignette)" opacity="0.4"/>
</svg>