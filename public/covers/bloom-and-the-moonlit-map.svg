<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <radialGradient id="ba-skyGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="50%" stop-color="#1a103d"/>
      <stop offset="100%" stop-color="#0a0e2a"/>
    </radialGradient>

    <linearGradient id="ba-waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2a6c"/>
      <stop offset="50%" stop-color="#0f1740"/>
      <stop offset="100%" stop-color="#0a0e2a"/>
    </linearGradient>

    <linearGradient id="ba-lotusLeafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e8b57"/>
      <stop offset="50%" stop-color="#3cb371"/>
      <stop offset="100%" stop-color="#2e8b57"/>
    </linearGradient>

    <linearGradient id="ba-lotusPetalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec8b"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>

    <linearGradient id="ba-fireflyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffacd"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffa500"/>
    </linearGradient>

    <radialGradient id="ba-mapGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ba-vignette" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.8"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="ba-softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="ba-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="ba-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="ba-fireflyGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feSpecularLighting result="specOut" in="blur" specularConstant="1" specularExponent="20" lighting-color="#ffd700">
        <fePointLight x="0" y="0" z="200"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>

  <style>
    @keyframes ba-twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .ba-twinkle { animation: ba-twinkle 3s ease-in-out infinite; }

    @keyframes ba-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .ba-bob { animation: ba-bob 5s ease-in-out infinite; }

    @keyframes ba-waterRipple {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-3px) scale(1.02); }
    }
    .ba-waterRipple { animation: ba-waterRipple 7s ease-in-out infinite; }

    @keyframes ba-fireflyFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(5px, -5px) rotate(5deg); }
      50% { transform: translate(0, -8px) rotate(0deg); }
      75% { transform: translate(-5px, -5px) rotate(-5deg); }
    }
    .ba-fireflyFloat { animation: ba-fireflyFloat 6s ease-in-out infinite; }

    @keyframes ba-mapPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    .ba-mapPulse { animation: ba-mapPulse 4s ease-in-out infinite; }

    @keyframes ba-sparkleDrift {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translate(10px, 15px) rotate(360deg); opacity: 0; }
    }
    .ba-sparkleDrift { animation: ba-sparkleDrift 8s ease-in-out infinite; }

    @keyframes ba-leafSway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    .ba-leafSway { animation: ba-leafSway 8s ease-in-out infinite; }

    @keyframes ba-cloudDrift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(20px); }
    }
    .ba-cloudDrift { animation: ba-cloudDrift 12s ease-in-out infinite; }
  </style>

  <!-- Layer 1: Sky/Background -->
  <rect width="512" height="512" fill="url(#ba-skyGrad)"/>

  <!-- Distant stars -->
  <g>
    <circle cx="80" cy="60" r="1.5" fill="#fff" class="ba-twinkle" style="animation-delay: 0.5s"/>
    <circle cx="150" cy="40" r="1" fill="#fff" class="ba-twinkle" style="animation-delay: 1s"/>
    <circle cx="220" cy="80" r="1.2" fill="#fff" class="ba-twinkle" style="animation-delay: 1.5s"/>
    <circle cx="300" cy="30" r="1.5" fill="#fff" class="ba-twinkle" style="animation-delay: 2s"/>
    <circle cx="380" cy="70" r="1" fill="#fff" class="ba-twinkle" style="animation-delay: 2.5s"/>
    <circle cx="450" cy="50" r="1.2" fill="#fff" class="ba-twinkle" style="animation-delay: 0s"/>
    <circle cx="120" cy="120" r="1.5" fill="#fff" class="ba-twinkle" style="animation-delay: 0.8s"/>
    <circle cx="280" cy="100" r="1" fill="#fff" class="ba-twinkle" style="animation-delay: 1.8s"/>
    <circle cx="400" cy="140" r="1.2" fill="#fff" class="ba-twinkle" style="animation-delay: 2.2s"/>
  </g>

  <!-- Distant mountains -->
  <path d="M0,300 Q100,250 200,280 Q300,260 400,290 Q500,270 512,300 L512,512 L0,512 Z" fill="#0a1a3a" opacity="0.7"/>

  <!-- Layer 2: Far Background -->
  <g class="ba-cloudDrift">
    <path d="M50,150 Q100,120 150,150 Q200,130 250,150 Q300,140 350,150 Q400,130 450,150" fill="#1a2a4a" opacity="0.6"/>
  </g>

  <!-- Distant temple silhouette -->
  <path d="M100,250 L100,200 L150,180 L200,200 L200,250 L150,270 Z M120,200 L180,200 L150,170 Z" fill="#0a1a3a" opacity="0.8"/>

  <!-- Layer 3: Mid Background -->
  <rect x="0" y="350" width="512" height="162" fill="url(#ba-waterGrad)" class="ba-waterRipple"/>

  <!-- Water reflections -->
  <g opacity="0.3">
    <circle cx="100" cy="380" r="2" fill="#fff" class="ba-twinkle" style="animation-delay: 0.2s"/>
    <circle cx="180" cy="400" r="1.5" fill="#fff" class="ba-twinkle" style="animation-delay: 0.7s"/>
    <circle cx="250" cy="370" r="1.8" fill="#fff" class="ba-twinkle" style="animation-delay: 1.2s"/>
    <circle cx="320" cy="410" r="1.2" fill="#fff" class="ba-twinkle" style="animation-delay: 1.7s"/>
    <circle cx="400" cy="390" r="1.5" fill="#fff" class="ba-twinkle" style="animation-delay: 2.2s"/>
  </g>

  <!-- Layer 4: Middle Ground -->
  <!-- Lotus leaves -->
  <g transform="translate(150, 380)">
    <g class="ba-leafSway">
      <path d="M0,0 Q50,-20 100,0 Q50,20 0,0 Z" fill="url(#ba-lotusLeafGrad)" filter="url(#ba-softGlow)"/>
    </g>
  </g>

  <g transform="translate(300, 390)">
    <g class="ba-leafSway" style="animation-delay: 1s">
      <path d="M0,0 Q40,-15 80,0 Q40,15 0,0 Z" fill="url(#ba-lotusLeafGrad)" filter="url(#ba-softGlow)"/>
    </g>
  </g>

  <g transform="translate(220, 360)">
    <g class="ba-leafSway" style="animation-delay: 2s">
      <path d="M0,0 Q60,-25 120,0 Q60,25 0,0 Z" fill="url(#ba-lotusLeafGrad)" filter="url(#ba-softGlow)"/>
    </g>
  </g>

  <!-- Layer 5: Main Character -->
  <!-- Lotus (main character) -->
  <g transform="translate(256, 240)">
    <g class="ba-bob">
      <!-- Stem -->
      <path d="M0,40 Q0,20 0,0 Q-5,-10 0,-20 Q5,-10 0,-40" stroke="#2e8b57" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- Petals -->
      <g filter="url(#ba-mediumGlow)">
        <path d="M0,-40 Q20,-60 40,-40 Q20,-20 0,-40 Z" fill="url(#ba-lotusPetalGrad)"/>
        <path d="M0,-40 Q-20,-60 -40,-40 Q-20,-20 0,-40 Z" fill="url(#ba-lotusPetalGrad)"/>
        <path d="M0,-40 Q30,-50 40,-20 Q20,0 0,-40 Z" fill="url(#ba-lotusPetalGrad)"/>
        <path d="M0,-40 Q-30,-50 -40,-20 Q-20,0 0,-40 Z" fill="url(#ba-lotusPetalGrad)"/>
        <path d="M0,-40 Q25,-45 30,-10 Q15,10 0,-40 Z" fill="url(#ba-lotusPetalGrad)"/>
        <path d="M0,-40 Q-25,-45 -30,-10 Q-15,10 0,-40 Z" fill="url(#ba-lotusPetalGrad)"/>
      </g>

      <!-- Center -->
      <circle cx="0" cy="-40" r="8" fill="#ffd700" filter="url(#ba-strongGlow)"/>

      <!-- Map in lotus's hands -->
      <g transform="translate(-15, -60)" class="ba-mapPulse">
        <path d="M0,0 Q10,-5 20,0 Q10,5 0,0 Z" fill="#f5f5dc" opacity="0.9" filter="url(#ba-softGlow)"/>
        <path d="M5,0 L15,0 M10,-3 L10,3" stroke="#8b4513" stroke-width="0.5" stroke-linecap="round"/>
        <circle cx="10" cy="0" r="8" fill="none" stroke="#ffd700" stroke-width="0.8" stroke-dasharray="2,1"/>
        <circle cx="10" cy="0" r="3" fill="url(#ba-mapGlow)"/>
      </g>
    </g>
  </g>

  <!-- Firefly -->
  <g transform="translate(280, 200)">
    <g class="ba-fireflyFloat">
      <circle cx="0" cy="0" r="4" fill="url(#ba-fireflyGrad)" filter="url(#ba-fireflyGlow)"/>
      <path d="M0,-6 L0,-10 M-2,-8 L0,-10 L2,-8" stroke="#ffd700" stroke-width="0.8" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Layer 6: Foreground Particles/Sparkles -->
  <!-- Floating sparkles -->
  <g>
    <g transform="translate(100, 150)" class="ba-sparkleDrift" style="animation-delay: 0s">
      <path d="M0,0 L3,3 M3,0 L0,3" stroke="#ffd700" stroke-width="0.8" stroke-linecap="round" opacity="0"/>
    </g>
    <g transform="translate(400, 100)" class="ba-sparkleDrift" style="animation-delay: 1s">
      <path d="M0,0 L4,4 M4,0 L0,4" stroke="#ffd700" stroke-width="0.8" stroke-linecap="round" opacity="0"/>
    </g>
    <g transform="translate(200, 80)" class="ba-sparkleDrift" style="animation-delay: 2s">
      <path d="M0,0 L2,5 M2,0 L0,5" stroke="#ffd700" stroke-width="0.8" stroke-linecap="round" opacity="0"/>
    </g>
    <g transform="translate(350, 200)" class="ba-sparkleDrift" style="animation-delay: 3s">
      <path d="M0,0 L5,2 M5,0 L0,2" stroke="#ffd700" stroke-width="0.8" stroke-linecap="round" opacity="0"/>
    </g>
    <g transform="translate(150, 250)" class="ba-sparkleDrift" style="animation-delay: 4s">
      <path d="M0,0 L3,3 M3,0 L0,3" stroke="#ffd700" stroke-width="0.8" stroke-linecap="round" opacity="0"/>
    </g>
  </g>

  <!-- Water sparkles -->
  <g>
    <circle cx="80" cy="420" r="1" fill="#ffd700" class="ba-twinkle" style="animation-delay: 0.3s"/>
    <circle cx="200" cy="450" r="1.2" fill="#ffd700" class="ba-twinkle" style="animation-delay: 0.9s"/>
    <circle cx="350" cy="430" r="1" fill="#ffd700" class="ba-twinkle" style="animation-delay: 1.4s"/>
    <circle cx="420" cy="460" r="1.3" fill="#ffd700" class="ba-twinkle" style="animation-delay: 1.9s"/>
  </g>

  <!-- Layer 7: Vignette Overlay -->
  <rect width="512" height="512" fill="url(#ba-vignette)" opacity="0.4"/>
</svg>