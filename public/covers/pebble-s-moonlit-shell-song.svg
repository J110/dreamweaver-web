<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <radialGradient id="pe-skyGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="50%" stop-color="#1a103d"/>
      <stop offset="100%" stop-color="#0a0e2a"/>
    </radialGradient>

    <linearGradient id="pe-riverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3b5f"/>
      <stop offset="50%" stop-color="#2a5b8f"/>
      <stop offset="100%" stop-color="#1a3b5f"/>
    </linearGradient>

    <linearGradient id="pe-shellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a3d2b"/>
      <stop offset="50%" stop-color="#7a5d4b"/>
      <stop offset="100%" stop-color="#5a3d2b"/>
    </linearGradient>

    <linearGradient id="pe-moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#fffacd"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>

    <radialGradient id="pe-glowGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="pe-vignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.8"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="pe-softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="pe-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="pe-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="pe-sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feSpecularLighting result="specOut" in="blur" specularConstant="1" specularExponent="20" lighting-color="#fff">
        <fePointLight x="0" y="0" z="200"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>

  <style>
    @keyframes pe-starTwinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .pe-star { animation: pe-starTwinkle 3s ease-in-out infinite; }

    @keyframes pe-moonPulse {
      0%, 100% { filter: url(#pe-softGlow); }
      50% { filter: url(#pe-mediumGlow); }
    }
    .pe-moon { animation: pe-moonPulse 5s ease-in-out infinite; }

    @keyframes pe-characterBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .pe-character-bob { animation: pe-characterBob 6s ease-in-out infinite; }

    @keyframes pe-riverFlow {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }
    .pe-river { animation: pe-riverFlow 8s ease-in-out infinite; }

    @keyframes pe-leafFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(5deg); }
    }
    .pe-leaf { animation: pe-leafFloat 7s ease-in-out infinite; }

    @keyframes pe-sparkleDrift {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translate(15px, -20px); opacity: 0; }
    }
    .pe-sparkle { animation: pe-sparkleDrift 9s ease-in-out infinite; }

    @keyframes pe-fireflyGlow {
      0%, 100% { filter: url(#pe-softGlow); opacity: 0.6; }
      50% { filter: url(#pe-mediumGlow); opacity: 1; }
    }
    .pe-firefly { animation: pe-fireflyGlow 4s ease-in-out infinite; }

    @keyframes pe-cloudDrift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(10px); }
    }
    .pe-cloud { animation: pe-cloudDrift 12s ease-in-out infinite; }
  </style>

  <!-- Layer 1: Sky/Background -->
  <rect width="512" height="512" fill="url(#pe-skyGrad)"/>

  <!-- Moon -->
  <g transform="translate(400, 100)">
    <circle cx="0" cy="0" r="40" fill="url(#pe-moonGrad)" class="pe-moon"/>
    <circle cx="-15" cy="-10" r="8" fill="#1a103d"/>
    <circle cx="10" cy="15" r="5" fill="#1a103d"/>
  </g>

  <!-- Stars -->
  <g>
    <circle cx="50" cy="80" r="1.5" fill="white" class="pe-star" style="animation-delay: 0s"/>
    <circle cx="120" cy="40" r="1.2" fill="white" class="pe-star" style="animation-delay: 0.5s"/>
    <circle cx="200" cy="90" r="1.8" fill="white" class="pe-star" style="animation-delay: 1s"/>
    <circle cx="300" cy="30" r="1.3" fill="white" class="pe-star" style="animation-delay: 1.5s"/>
    <circle cx="450" cy="70" r="1.6" fill="white" class="pe-star" style="animation-delay: 2s"/>
    <circle cx="80" cy="150" r="1.1" fill="white" class="pe-star" style="animation-delay: 2.5s"/>
    <circle cx="180" cy="200" r="1.4" fill="white" class="pe-star" style="animation-delay: 0.2s"/>
    <circle cx="350" cy="180" r="1.7" fill="white" class="pe-star" style="animation-delay: 0.7s"/>
    <circle cx="420" cy="220" r="1.2" fill="white" class="pe-star" style="animation-delay: 1.2s"/>
  </g>

  <!-- Layer 2: Far Background -->
  <g class="pe-cloud">
    <path d="M50,120 Q80,100 120,120 Q140,110 160,120 Q180,100 200,120 Q220,110 240,120 L240,150 Q220,140 200,150 Q180,140 160,150 Q140,140 120,150 Q80,140 50,150 Z" fill="white" opacity="0.3"/>
  </g>
  <g class="pe-cloud" style="animation-delay: 2s">
    <path d="M300,100 Q330,80 370,100 Q390,90 410,100 Q430,80 450,100 Q470,90 490,100 L490,130 Q470,120 450,130 Q430,120 410,130 Q390,120 370,130 Q330,120 300,130 Z" fill="white" opacity="0.2"/>
  </g>

  <!-- Distant trees -->
  <path d="M0,250 Q20,220 50,250 Q70,230 100,250 Q120,240 150,250 L150,350 Q120,340 100,350 Q70,340 50,350 Q20,330 0,350 Z" fill="#1a3b2a"/>
  <path d="M450,240 Q470,210 500,240 Q520,220 550,240 L550,350 Q520,340 500,350 Q470,340 450,350 Z" fill="#1a3b2a"/>

  <!-- Layer 3: Mid Background -->
  <rect x="0" y="300" width="512" height="212" fill="url(#pe-riverGrad)" class="pe-river"/>

  <!-- River reflections -->
  <g opacity="0.6">
    <circle cx="400" cy="320" r="25" fill="white" opacity="0.3"/>
    <circle cx="100" cy="340" r="15" fill="white" opacity="0.2"/>
    <circle cx="250" cy="310" r="20" fill="white" opacity="0.3"/>
  </g>

  <!-- Layer 4: Middle Ground -->
  <!-- Riverbank -->
  <path d="M0,350 Q50,330 100,350 Q150,340 200,350 Q250,330 300,350 Q350,340 400,350 Q450,330 512,350 L512,512 L0,512 Z" fill="#3a2d1a"/>

  <!-- Plants -->
  <g transform="translate(50, 320)">
    <path d="M0,0 Q-10,-20 0,-40 Q10,-20 0,0" fill="#2a5b3a" class="pe-leaf"/>
    <path d="M10,0 Q0,-15 10,-30 Q20,-15 10,0" fill="#3a7b4a" class="pe-leaf" style="animation-delay: 1s"/>
  </g>
  <g transform="translate(450, 330)">
    <path d="M0,0 Q-8,-18 0,-35 Q8,-18 0,0" fill="#2a5b3a" class="pe-leaf"/>
    <path d="M12,0 Q4,-12 12,-25 Q20,-12 12,0" fill="#3a7b4a" class="pe-leaf" style="animation-delay: 2s"/>
  </g>

  <!-- Fireflies -->
  <g transform="translate(150, 200)">
    <circle cx="0" cy="0" r="3" fill="#ffd700" class="pe-firefly" style="animation-delay: 0s"/>
  </g>
  <g transform="translate(350, 180)">
    <circle cx="0" cy="0" r="3" fill="#ffd700" class="pe-firefly" style="animation-delay: 1s"/>
  </g>
  <g transform="translate(250, 150)">
    <circle cx="0" cy="0" r="3" fill="#ffd700" class="pe-firefly" style="animation-delay: 2s"/>
  </g>

  <!-- Layer 5: Main Character -->
  <g transform="translate(256, 240)">
    <g class="pe-character-bob">
      <!-- Shell -->
      <path d="M-40,-20 Q-30,-40 0,-45 Q30,-40 40,-20 Q30,0 0,5 Q-30,0 -40,-20 Z" fill="url(#pe-shellGrad)"/>
      <path d="M-30,-15 Q-20,-30 0,-35 Q20,-30 30,-15" stroke="#3a2d1a" stroke-width="1" fill="none"/>

      <!-- Head -->
      <circle cx="0" cy="15" r="12" fill="#5a3d2b"/>
      <circle cx="5" cy="10" r="2" fill="white"/>
      <circle cx="6" cy="9" r="1" fill="black"/>
      <path d="M-8,12 Q-4,8 0,12" stroke="#3a2d1a" stroke-width="1" fill="none"/>

      <!-- Legs -->
      <circle cx="-25" cy="20" r="8" fill="#5a3d2b"/>
      <circle cx="25" cy="20" r="8" fill="#5a3d2b"/>
      <circle cx="-25" cy="40" r="6" fill="#5a3d2b"/>
      <circle cx="25" cy="40" r="6" fill="#5a3d2b"/>

      <!-- Tail -->
      <path d="M-35,0 Q-40,10 -35,20 Q-30,10 -35,0" fill="#5a3d2b"/>
    </g>
  </g>

  <!-- Layer 6: Foreground Particles/Sparkles -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="2" fill="white" filter="url(#pe-sparkleGlow)" class="pe-sparkle" style="animation-delay: 0s"/>
  </g>
  <g transform="translate(400, 80)">
    <circle cx="0" cy="0" r="2" fill="white" filter="url(#pe-sparkleGlow)" class="pe-sparkle" style="animation-delay: 1s"/>
  </g>
  <g transform="translate(200, 50)">
    <circle cx="0" cy="0" r="2" fill="white" filter="url(#pe-sparkleGlow)" class="pe-sparkle" style="animation-delay: 2s"/>
  </g>
  <g transform="translate(350, 200)">
    <circle cx="0" cy="0" r="2" fill="white" filter="url(#pe-sparkleGlow)" class="pe-sparkle" style="animation-delay: 3s"/>
  </g>
  <g transform="translate(150, 250)">
    <circle cx="0" cy="0" r="2" fill="white" filter="url(#pe-sparkleGlow)" class="pe-sparkle" style="animation-delay: 4s"/>
  </g>

  <!-- Layer 7: Vignette Overlay -->
  <rect width="512" height="512" fill="url(#pe-vignette)" opacity="0.4"/>
</svg>