<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sky gradient: moonlit ocean night -->
    <linearGradient id="lm-skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1030" stop-opacity="1"/>
      <stop offset="35%" stop-color="#1a2858" stop-opacity="1"/>
      <stop offset="65%" stop-color="#1a3a6a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1a4a7a" stop-opacity="1"/>
    </linearGradient>

    <!-- Ocean gradient -->
    <linearGradient id="lm-oceanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a6a" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#0d2a50" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#081830" stop-opacity="1"/>
    </linearGradient>

    <!-- Moon glow -->
    <radialGradient id="lm-moonGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fef8e0" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#e8ddb0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8ddb0" stop-opacity="0"/>
    </radialGradient>

    <!-- Treehouse glow (warm window light) -->
    <radialGradient id="lm-treeGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ffdd88" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffdd88" stop-opacity="0"/>
    </radialGradient>

    <!-- Underwater school glow -->
    <radialGradient id="lm-schoolGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#66ddff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#66ddff" stop-opacity="0"/>
    </radialGradient>

    <!-- Character glow -->
    <radialGradient id="lm-charGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#88ccff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#88ccff" stop-opacity="0"/>
    </radialGradient>

    <!-- Fish scale shimmer -->
    <radialGradient id="lm-fishGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="lm-vignette">
      <stop offset="45%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="lm-softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lm-medGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lm-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lm-waterBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Star twinkling */
    @keyframes lm-twinkle1 {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes lm-twinkle2 {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    /* Wave rolling */
    @keyframes lm-wave1 {
      0%, 100% { transform: translateX(0px) translateY(0px); }
      50% { transform: translateX(8px) translateY(-3px); }
    }
    @keyframes lm-wave2 {
      0%, 100% { transform: translateX(0px) translateY(0px); }
      50% { transform: translateX(-6px) translateY(-2px); }
    }

    /* Treehouse bobbing on waves */
    @keyframes lm-treeBob {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-4px) rotate(0.5deg); }
      75% { transform: translateY(3px) rotate(-0.5deg); }
    }

    /* Leo breathing */
    @keyframes lm-leoBreathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    /* Fish swimming */
    @keyframes lm-fishSwim1 {
      0%, 100% { transform: translateX(0px) translateY(0px); }
      50% { transform: translateX(12px) translateY(-5px); }
    }
    @keyframes lm-fishSwim2 {
      0%, 100% { transform: translateX(0px) translateY(0px); }
      50% { transform: translateX(-10px) translateY(-3px); }
    }
    @keyframes lm-fishSwim3 {
      0%, 100% { transform: translateX(0px) translateY(0px); }
      50% { transform: translateX(8px) translateY(4px); }
    }

    /* Bubble rise */
    @keyframes lm-bubbleRise {
      0% { transform: translateY(0px); opacity: 0.6; }
      100% { transform: translateY(-30px); opacity: 0; }
    }

    /* Moonlight shimmer on water */
    @keyframes lm-moonShimmer {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.35; }
    }

    /* Seashell glow (turtle's book) */
    @keyframes lm-shellGlow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* Turtle bob */
    @keyframes lm-turtleBob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }

    /* Window flicker */
    @keyframes lm-windowFlicker {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.75; }
    }

    /* Assignments */
    .lm-star1 { animation: lm-twinkle1 3s ease-in-out infinite; }
    .lm-star2 { animation: lm-twinkle2 3.5s ease-in-out infinite 0.4s; }
    .lm-star3 { animation: lm-twinkle1 2.8s ease-in-out infinite 1s; }
    .lm-star4 { animation: lm-twinkle2 4s ease-in-out infinite 0.7s; }
    .lm-star5 { animation: lm-twinkle1 3.3s ease-in-out infinite 1.5s; }
    .lm-star6 { animation: lm-twinkle2 3.8s ease-in-out infinite 0.2s; }
    .lm-star7 { animation: lm-twinkle1 4.2s ease-in-out infinite 1.2s; }
    .lm-star8 { animation: lm-twinkle2 3.6s ease-in-out infinite 1.8s; }

    .lm-waveA { animation: lm-wave1 5s ease-in-out infinite; }
    .lm-waveB { animation: lm-wave2 6s ease-in-out infinite 1s; }
    .lm-waveC { animation: lm-wave1 5.5s ease-in-out infinite 2s; }

    .lm-treehouse {
      animation: lm-treeBob 6s ease-in-out infinite;
    }

    .lm-leo {
      transform-origin: 256px 200px;
      animation: lm-leoBreathe 5s ease-in-out infinite;
    }

    .lm-fish1 { animation: lm-fishSwim1 4.5s ease-in-out infinite; }
    .lm-fish2 { animation: lm-fishSwim2 5s ease-in-out infinite 0.8s; }
    .lm-fish3 { animation: lm-fishSwim3 4s ease-in-out infinite 1.5s; }

    .lm-bubble1 { animation: lm-bubbleRise 7s ease-in-out infinite; }
    .lm-bubble2 { animation: lm-bubbleRise 8s ease-in-out infinite 1.5s; }
    .lm-bubble3 { animation: lm-bubbleRise 6.5s ease-in-out infinite 3s; }
    .lm-bubble4 { animation: lm-bubbleRise 7.5s ease-in-out infinite 4s; }

    .lm-moonOnWater { animation: lm-moonShimmer 4s ease-in-out infinite; }

    .lm-shellLight { animation: lm-shellGlow 3.5s ease-in-out infinite; }

    .lm-turtle { animation: lm-turtleBob 5.5s ease-in-out infinite; }

    .lm-windowGlow { animation: lm-windowFlicker 3s ease-in-out infinite; }
  </style>

  <!-- LAYER 1: Background — moonlit night sky -->
  <rect width="512" height="512" fill="url(#lm-skyGrad)"/>

  <!-- Stars -->
  <circle class="lm-star1" cx="50" cy="35" r="1.2" fill="#ffffff"/>
  <circle class="lm-star2" cx="130" cy="20" r="1" fill="#e8e8ff"/>
  <circle class="lm-star3" cx="200" cy="45" r="0.9" fill="#ffffff"/>
  <circle class="lm-star4" cx="320" cy="28" r="1.1" fill="#e8e8ff"/>
  <circle class="lm-star5" cx="400" cy="40" r="0.8" fill="#ffffff"/>
  <circle class="lm-star6" cx="470" cy="25" r="1" fill="#e8e8ff"/>
  <circle class="lm-star7" cx="85" cy="60" r="0.7" fill="#ffffff"/>
  <circle class="lm-star8" cx="360" cy="55" r="0.9" fill="#ffffff"/>

  <!-- Moon (upper right) -->
  <circle cx="420" cy="70" r="30" fill="url(#lm-moonGlow)" filter="url(#lm-medGlow)"/>
  <circle cx="420" cy="70" r="18" fill="#fef8e0" opacity="0.9" filter="url(#lm-softGlow)"/>
  <!-- Moon crater details -->
  <circle cx="415" cy="65" r="3" fill="#e8d8a0" opacity="0.2"/>
  <circle cx="425" cy="75" r="2" fill="#e8d8a0" opacity="0.15"/>

  <!-- LAYER 2: Far background — distant waves/horizon -->
  <path d="M 0 220 Q 128 210 256 220 Q 384 230 512 215 L 512 512 L 0 512 Z" fill="url(#lm-oceanGrad)"/>

  <!-- Moonlight reflection on water -->
  <g class="lm-moonOnWater">
    <ellipse cx="420" cy="235" rx="40" ry="8" fill="#fef8e0" opacity="0.1" filter="url(#lm-waterBlur)"/>
    <ellipse cx="420" cy="240" rx="25" ry="5" fill="#fef8e0" opacity="0.15"/>
    <ellipse cx="420" cy="245" rx="15" ry="3" fill="#fef8e0" opacity="0.2"/>
  </g>

  <!-- LAYER 3: Mid background — Underwater school glow (below waterline) -->
  <!-- School dome shape (underwater, soft glow) -->
  <circle cx="260" cy="380" r="70" fill="url(#lm-schoolGlow)" filter="url(#lm-medGlow)"/>
  <!-- Coral/reef silhouettes -->
  <path d="M 80 450 Q 90 420 100 430 Q 110 410 120 440 L 130 460" fill="#2a3a5a" opacity="0.4"/>
  <path d="M 380 440 Q 395 410 405 425 Q 415 405 425 435 L 435 460" fill="#2a3a5a" opacity="0.35"/>
  <!-- Seaweed -->
  <path d="M 150 512 Q 145 470 155 440 Q 148 420 152 400" stroke="#2a5a4a" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M 370 512 Q 375 480 365 450 Q 372 430 368 410" stroke="#2a5a4a" stroke-width="3" fill="none" opacity="0.3"/>

  <!-- Waves on water surface -->
  <g>
    <g class="lm-waveA">
      <path d="M 0 225 Q 60 218 120 225 Q 180 232 240 225" fill="none" stroke="#4a7aaa" stroke-width="1.5" opacity="0.3"/>
    </g>
  </g>
  <g>
    <g class="lm-waveB">
      <path d="M 200 230 Q 270 222 340 230 Q 410 238 480 228" fill="none" stroke="#4a7aaa" stroke-width="1.2" opacity="0.25"/>
    </g>
  </g>
  <g>
    <g class="lm-waveC">
      <path d="M 50 235 Q 130 228 210 236 Q 290 244 370 235" fill="none" stroke="#5a8abb" stroke-width="1" opacity="0.2"/>
    </g>
  </g>

  <!-- LAYER 4: Treehouse floating on water -->
  <g transform="translate(180, 170)">
    <g class="lm-treehouse">
      <!-- Treehouse platform (floating raft/base) -->
      <path d="M -45 40 Q -50 45 -40 50 L 100 50 Q 110 45 105 40 Z" fill="#8a6a4a" stroke="#6a4a2a" stroke-width="1"/>
      <!-- Log detail -->
      <line x1="-35" y1="45" x2="95" y2="45" stroke="#6a4a2a" stroke-width="0.8" opacity="0.5"/>

      <!-- Treehouse walls (soft blue glow) -->
      <rect x="5" y="-25" width="55" height="65" fill="#3a5a7a" rx="3" stroke="#4a6a8a" stroke-width="1"/>

      <!-- Roof -->
      <path d="M 0 -25 L 32 -50 L 65 -25 Z" fill="#5a4a3a" stroke="#4a3a2a" stroke-width="1"/>

      <!-- Round window (golden glow) -->
      <circle cx="32" cy="5" r="14" fill="#1a2a4a" stroke="#4a6a8a" stroke-width="1.5"/>
      <circle class="lm-windowGlow" cx="32" cy="5" r="12" fill="#ffdd88" opacity="0.4" filter="url(#lm-softGlow)"/>
      <!-- Window cross -->
      <line x1="32" y1="-7" x2="32" y2="17" stroke="#4a6a8a" stroke-width="1"/>
      <line x1="20" y1="5" x2="44" y2="5" stroke="#4a6a8a" stroke-width="1"/>

      <!-- Warm glow spilling from window -->
      <circle cx="32" cy="5" r="30" fill="url(#lm-treeGlow)" opacity="0.5"/>
    </g>
  </g>

  <!-- LAYER 5: Leo (boy looking down at underwater world) + Turtle -->
  <!-- Leo in the treehouse window -->
  <g transform="translate(212, 170)">
    <g class="lm-leo">
      <!-- Head -->
      <circle cx="0" cy="0" r="14" fill="#f4b5a0" filter="url(#lm-softGlow)"/>

      <!-- Hair (messy brown) -->
      <ellipse cx="0" cy="-8" rx="15" ry="6" fill="#5a3a1a"/>
      <path d="M -10 -8 Q -14 -2 -12 2" stroke="#5a3a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 10 -8 Q 14 -2 12 2" stroke="#5a3a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Stray hair tuft -->
      <path d="M -2 -14 Q 0 -20 3 -15" stroke="#5a3a1a" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- Eyes (wide with wonder, looking down) -->
      <!-- Left eye -->
      <circle cx="-5" cy="-1" r="3.5" fill="#ffffff"/>
      <circle cx="-5" cy="0" r="2.5" fill="#5a8ab0"/>
      <circle cx="-5" cy="0.5" r="1.5" fill="#2a4a6a"/>
      <circle cx="-3.5" cy="-2" r="1" fill="#ffffff" opacity="0.9"/>
      <!-- Right eye -->
      <circle cx="5" cy="-1" r="3.5" fill="#ffffff"/>
      <circle cx="5" cy="0" r="2.5" fill="#5a8ab0"/>
      <circle cx="5" cy="0.5" r="1.5" fill="#2a4a6a"/>
      <circle cx="6.5" cy="-2" r="1" fill="#ffffff" opacity="0.9"/>

      <!-- Happy open mouth (gasping with wonder) -->
      <ellipse cx="0" cy="6" rx="3" ry="2" fill="#c87a6a" opacity="0.7"/>

      <!-- Rosy cheeks -->
      <circle cx="-9" cy="3" r="2.5" fill="#ffb6c1" opacity="0.4"/>
      <circle cx="9" cy="3" r="2.5" fill="#ffb6c1" opacity="0.4"/>

      <!-- Arms resting on window ledge -->
      <path d="M -10 10 L -16 16" stroke="#f4b5a0" stroke-width="4" stroke-linecap="round"/>
      <path d="M 10 10 L 16 16" stroke="#f4b5a0" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Turtle teacher (underwater, below treehouse) -->
  <g transform="translate(250, 340)">
    <g class="lm-turtle">
      <!-- Turtle body/shell -->
      <ellipse cx="0" cy="0" rx="25" ry="16" fill="#5a8a6a" stroke="#4a7a5a" stroke-width="1"/>
      <!-- Shell pattern -->
      <path d="M -10 -5 Q 0 -10 10 -5" fill="none" stroke="#4a7a5a" stroke-width="0.8" opacity="0.5"/>
      <path d="M -15 0 Q 0 -5 15 0" fill="none" stroke="#4a7a5a" stroke-width="0.8" opacity="0.5"/>
      <path d="M -10 5 Q 0 0 10 5" fill="none" stroke="#4a7a5a" stroke-width="0.8" opacity="0.5"/>

      <!-- Turtle head -->
      <circle cx="28" cy="-3" r="8" fill="#6a9a7a"/>
      <!-- Eye -->
      <circle cx="32" cy="-5" r="2" fill="#ffffff"/>
      <circle cx="32.5" cy="-4.5" r="1.2" fill="#2a4a3a"/>
      <circle cx="33.5" cy="-5.5" r="0.6" fill="#ffffff" opacity="0.8"/>
      <!-- Smile -->
      <path d="M 30 0 Q 33 2 36 0" stroke="#4a6a5a" stroke-width="0.6" fill="none"/>

      <!-- Flippers -->
      <ellipse cx="-18" cy="10" rx="8" ry="3" fill="#5a8a6a" transform="rotate(-20 -18 10)"/>
      <ellipse cx="18" cy="10" rx="8" ry="3" fill="#5a8a6a" transform="rotate(20 18 10)"/>

      <!-- Glowing seashell "book" held by turtle -->
      <g transform="translate(35, 5)">
        <circle class="lm-shellLight" cx="0" cy="0" r="10" fill="url(#lm-fishGlow)" filter="url(#lm-softGlow)"/>
        <ellipse cx="0" cy="0" rx="7" ry="5" fill="#ffeedd" opacity="0.7" stroke="#ffd700" stroke-width="0.8"/>
        <!-- Shell ridges -->
        <line x1="-4" y1="-3" x2="0" y2="3" stroke="#ffd700" stroke-width="0.5" opacity="0.5"/>
        <line x1="0" y1="-4" x2="0" y2="3" stroke="#ffd700" stroke-width="0.5" opacity="0.5"/>
        <line x1="4" y1="-3" x2="0" y2="3" stroke="#ffd700" stroke-width="0.5" opacity="0.5"/>
      </g>
    </g>
  </g>

  <!-- LAYER 6: Fish with backpacks + bubbles + sparkles -->

  <!-- Fish 1 (blue, with tiny backpack) -->
  <g transform="translate(160, 320)">
    <g class="lm-fish1">
      <ellipse cx="0" cy="0" rx="10" ry="6" fill="#66aadd"/>
      <path d="M -10 0 L -16 -5 L -16 5 Z" fill="#5599cc"/>
      <!-- Eye -->
      <circle cx="5" cy="-1" r="1.5" fill="#ffffff"/>
      <circle cx="5.5" cy="-0.5" r="0.8" fill="#2a4a6a"/>
      <!-- Tiny backpack -->
      <rect x="-4" y="-6" width="6" height="5" fill="#ff8855" rx="1" opacity="0.8"/>
    </g>
  </g>

  <!-- Fish 2 (yellow-gold) -->
  <g transform="translate(320, 360)">
    <g class="lm-fish2">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="#ffcc44"/>
      <path d="M 8 0 L 14 -4 L 14 4 Z" fill="#eebb33"/>
      <!-- Eye -->
      <circle cx="-3" cy="-1" r="1.2" fill="#ffffff"/>
      <circle cx="-3.5" cy="-0.5" r="0.7" fill="#4a3a2a"/>
      <!-- Backpack -->
      <rect x="-2" y="-5" width="5" height="4" fill="#88aadd" rx="1" opacity="0.8"/>
    </g>
  </g>

  <!-- Fish 3 (pink-coral) -->
  <g transform="translate(200, 400)">
    <g class="lm-fish3">
      <ellipse cx="0" cy="0" rx="7" ry="4" fill="#ff8899"/>
      <path d="M -7 0 L -12 -3 L -12 3 Z" fill="#ff7788"/>
      <!-- Eye -->
      <circle cx="3" cy="-1" r="1" fill="#ffffff"/>
      <circle cx="3.3" cy="-0.5" r="0.6" fill="#4a2a3a"/>
      <!-- Backpack -->
      <rect x="-3" y="-4" width="4" height="3" fill="#88dd88" rx="1" opacity="0.8"/>
    </g>
  </g>

  <!-- Bubbles rising -->
  <circle class="lm-bubble1" cx="230" cy="300" r="2.5" fill="none" stroke="#88ccff" stroke-width="0.5" opacity="0.5"/>
  <circle class="lm-bubble2" cx="280" cy="330" r="2" fill="none" stroke="#88ccff" stroke-width="0.5" opacity="0.4"/>
  <circle class="lm-bubble3" cx="310" cy="370" r="1.8" fill="none" stroke="#88ccff" stroke-width="0.5" opacity="0.5"/>
  <circle class="lm-bubble4" cx="190" cy="380" r="1.5" fill="none" stroke="#88ccff" stroke-width="0.5" opacity="0.4"/>
  <!-- More scattered bubbles -->
  <circle class="lm-bubble1" cx="340" cy="310" r="1.2" fill="none" stroke="#aaddff" stroke-width="0.4" opacity="0.3"/>
  <circle class="lm-bubble3" cx="170" cy="350" r="1" fill="none" stroke="#aaddff" stroke-width="0.4" opacity="0.3"/>

  <!-- Sparkles (golden, scattered underwater) -->
  <circle class="lm-star1" cx="200" cy="290" r="1" fill="#ffd700" opacity="0.4" filter="url(#lm-softGlow)"/>
  <circle class="lm-star3" cx="300" cy="310" r="1.2" fill="#ffd700" opacity="0.35" filter="url(#lm-softGlow)"/>
  <circle class="lm-star5" cx="260" cy="420" r="1" fill="#ffd700" opacity="0.3"/>
  <circle class="lm-star7" cx="150" cy="430" r="0.8" fill="#ffe4b5" opacity="0.3"/>
  <circle class="lm-star2" cx="350" cy="400" r="1" fill="#ffe4b5" opacity="0.25"/>

  <!-- LAYER 7: Vignette overlay -->
  <rect width="512" height="512" fill="url(#lm-vignette)" opacity="0.4"/>
</svg>