<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sp-skyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="50%" stop-color="#1a103d"/>
      <stop offset="100%" stop-color="#0a0e2a"/>
    </radialGradient>

    <linearGradient id="sp-waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a4a6b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a2a4a" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="sp-coralGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0.8"/>
    </linearGradient>

    <filter id="sp-softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="sp-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="sp-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <radialGradient id="sp-vignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.8"/>
    </radialGradient>

    <filter id="sp-sparkleGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feSpecularLighting result="specOut" in="blur" specularConstant="1" specularExponent="20" lighting-color="#ffd700">
        <fePointLight x="0" y="0" z="200"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>

  <style>
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .sp-twinkle { animation: twinkle 3s ease-in-out infinite; }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .sp-bob { animation: bob 5s ease-in-out infinite; }

    @keyframes wave {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }
    .sp-wave { animation: wave 7s ease-in-out infinite; }

    @keyframes drift {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(5px, -5px) rotate(10deg); }
      50% { transform: translate(10px, 0) rotate(0deg); }
      75% { transform: translate(5px, 5px) rotate(-10deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    .sp-drift { animation: drift 8s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; filter: url(#sp-softGlow); }
      50% { opacity: 1; filter: url(#sp-mediumGlow); }
    }
    .sp-pulse { animation: pulse 4s ease-in-out infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .sp-float { animation: float 6s ease-in-out infinite; }

    @keyframes coralGlow {
      0%, 100% { filter: url(#sp-mediumGlow); }
      50% { filter: url(#sp-strongGlow); }
    }
    .sp-coral-glow { animation: coralGlow 5s ease-in-out infinite; }
  </style>

  <!-- Layer 1: Sky/Background -->
  <rect width="512" height="512" fill="url(#sp-skyGrad)"/>

  <!-- Distant stars -->
  <g>
    <circle cx="50" cy="80" r="1" fill="white" class="sp-twinkle" style="animation-delay: 0s"/>
    <circle cx="120" cy="40" r="1.2" fill="white" class="sp-twinkle" style="animation-delay: 0.5s"/>
    <circle cx="200" cy="60" r="0.8" fill="white" class="sp-twinkle" style="animation-delay: 1s"/>
    <circle cx="300" cy="30" r="1.5" fill="white" class="sp-twinkle" style="animation-delay: 1.5s"/>
    <circle cx="400" cy="70" r="1" fill="white" class="sp-twinkle" style="animation-delay: 2s"/>
    <circle cx="450" cy="120" r="1.2" fill="white" class="sp-twinkle" style="animation-delay: 2.5s"/>
    <circle cx="150" cy="150" r="0.7" fill="white" class="sp-twinkle" style="animation-delay: 0.3s"/>
    <circle cx="350" cy="180" r="1.3" fill="white" class="sp-twinkle" style="animation-delay: 1.8s"/>
  </g>

  <!-- Layer 2: Far Background -->
  <g>
    <!-- Distant islands -->
    <path d="M0,400 Q100,350 200,400 T400,400 L400,512 L0,512 Z" fill="#0a2a4a" opacity="0.7"/>
    <path d="M100,420 Q200,380 300,420 T500,420 L500,512 L100,512 Z" fill="#0a2a4a" opacity="0.5"/>

    <!-- Distant coral constellations -->
    <g transform="translate(50, 300)">
      <path d="M0,0 Q20,-20 40,0 Q60,20 80,0 Q60,-20 40,0 Z" fill="url(#sp-coralGlow)" opacity="0.6" class="sp-coral-glow" style="animation-delay: 0.2s"/>
    </g>
    <g transform="translate(400, 280)">
      <path d="M0,0 Q15,-15 30,0 Q45,15 60,0 Q45,-15 30,0 Z" fill="url(#sp-coralGlow)" opacity="0.6" class="sp-coral-glow" style="animation-delay: 0.4s"/>
    </g>
  </g>

  <!-- Layer 3: Mid Background -->
  <g>
    <!-- Water -->
    <rect x="0" y="400" width="512" height="112" fill="url(#sp-waterGrad)"/>

    <!-- Water waves -->
    <path d="M0,420 Q100,410 200,420 T400,420 L400,420 L0,420 Z" fill="#1a4a6b" opacity="0.3" class="sp-wave"/>
    <path d="M0,440 Q150,430 300,440 T512,440 L512,440 L0,440 Z" fill="#1a4a6b" opacity="0.2" class="sp-wave" style="animation-delay: 1s"/>
    <path d="M0,460 Q120,450 240,460 T480,460 L480,460 L0,460 Z" fill="#0a2a4a" opacity="0.4" class="sp-wave" style="animation-delay: 2s"/>

    <!-- Island base -->
    <path d="M150,380 Q256,320 360,380 L360,512 L150,512 Z" fill="#3a2a1a"/>
    <path d="M200,360 Q256,300 310,360 L310,512 L200,512 Z" fill="#4a3a2a"/>
  </g>

  <!-- Layer 4: Middle Ground -->
  <g>
    <!-- Coral constellations -->
    <g transform="translate(200, 350)">
      <path d="M0,0 Q30,-30 60,0 Q90,30 120,0 Q90,-30 60,0 Z" fill="url(#sp-coralGlow)" class="sp-coral-glow"/>
      <circle cx="30" cy="-15" r="8" fill="#ffd700" class="sp-pulse"/>
      <circle cx="90" cy="-15" r="6" fill="#ff6b9d" class="sp-pulse" style="animation-delay: 1s"/>
    </g>

    <!-- Island details -->
    <path d="M220,380 Q240,360 260,380 Q280,400 300,380" stroke="#5a4a3a" stroke-width="2" fill="none"/>
    <circle cx="230" cy="390" r="3" fill="#5a4a3a"/>
    <circle cx="270" cy="370" r="2" fill="#5a4a3a"/>

    <!-- Small companion creatures -->
    <g transform="translate(180, 360)">
      <g class="sp-float">
        <path d="M0,0 Q10,-10 20,0 Q10,10 0,0 Z" fill="#ff9a8b" filter="url(#sp-softGlow)"/>
        <circle cx="10" cy="-5" r="3" fill="white"/>
      </g>
    </g>

    <g transform="translate(320, 350)">
      <g class="sp-float" style="animation-delay: 1s">
        <path d="M0,0 Q8,-8 16,0 Q8,8 0,0 Z" fill="#8bff9a" filter="url(#sp-softGlow)"/>
        <circle cx="8" cy="-4" r="2" fill="white"/>
      </g>
    </g>

    <g transform="translate(250, 380)">
      <g class="sp-float" style="animation-delay: 2s">
        <ellipse cx="0" cy="0" rx="8" ry="5" fill="#9a8bff" filter="url(#sp-softGlow)"/>
        <circle cx="-3" cy="-2" r="2" fill="white"/>
        <circle cx="3" cy="-2" r="2" fill="white"/>
      </g>
    </g>
  </g>

  <!-- Layer 5: Main Character (Sparks) -->
  <g transform="translate(256, 240)">
    <g class="sp-bob">
      <!-- Body -->
      <rect x="-20" y="0" width="40" height="50" rx="10" fill="#c0c0c0" filter="url(#sp-softGlow)"/>

      <!-- Head -->
      <circle cx="0" cy="-25" r="20" fill="#d0d0d0"/>

      <!-- Eyes -->
      <circle cx="-8" cy="-30" r="4" fill="white"/>
      <circle cx="8" cy="-30" r="4" fill="white"/>
      <circle cx="-8" cy="-30" r="2" fill="#0a0e2a"/>
      <circle cx="8" cy="-30" r="2" fill="#0a0e2a"/>

      <!-- Antenna -->
      <path d="M0,-45 Q5,-55 10,-45" stroke="#ffd700" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="10" cy="-45" r="3" fill="#ffd700" class="sp-pulse"/>

      <!-- Arms -->
      <rect x="-30" y="10" width="15" height="8" rx="4" fill="#b0b0b0"/>
      <rect x="15" y="10" width="15" height="8" rx="4" fill="#b0b0b0"/>

      <!-- Legs -->
      <rect x="-15" y="50" width="10" height="20" rx="5" fill="#a0a0a0"/>
      <rect x="5" y="50" width="10" height="20" rx="5" fill="#a0a0a0"/>

      <!-- Heart (friendship symbol) -->
      <path d="M-5,0 Q0,-10 5,0 Q0,10 -5,0 Z" fill="#ff6b9d" transform="translate(0, 15)" class="sp-pulse" style="animation-delay: 0.5s"/>
    </g>
  </g>

  <!-- Layer 6: Foreground Particles/Sparkles -->
  <g>
    <!-- Floating sparkles -->
    <g transform="translate(100, 100)">
      <g class="sp-drift">
        <circle cx="0" cy="0" r="2" fill="#ffd700" filter="url(#sp-sparkleGlow)"/>
      </g>
    </g>
    <g transform="translate(400, 80)">
      <g class="sp-drift" style="animation-delay: 1s">
        <circle cx="0" cy="0" r="2.5" fill="#ff6b9d" filter="url(#sp-sparkleGlow)"/>
      </g>
    </g>
    <g transform="translate(150, 200)">
      <g class="sp-drift" style="animation-delay: 2s">
        <circle cx="0" cy="0" r="1.5" fill="#ffd700" filter="url(#sp-sparkleGlow)"/>
      </g>
    </g>
    <g transform="translate(350, 180)">
      <g class="sp-drift" style="animation-delay: 3s">
        <circle cx="0" cy="0" r="2" fill="#ff6b9d" filter="url(#sp-sparkleGlow)"/>
      </g>
    </g>
    <g transform="translate(200, 50)">
      <g class="sp-drift" style="animation-delay: 4s">
        <circle cx="0" cy="0" r="1.8" fill="#ffd700" filter="url(#sp-sparkleGlow)"/>
      </g>
    </g>
    <g transform="translate(300, 120)">
      <g class="sp-drift" style="animation-delay: 5s">
        <circle cx="0" cy="0" r="2.2" fill="#ff6b9d" filter="url(#sp-sparkleGlow)"/>
      </g>
    </g>

    <!-- Nearby coral sparkles -->
    <g transform="translate(220, 320)">
      <circle cx="0" cy="0" r="3" fill="#ffd700" class="sp-pulse" style="animation-delay: 0.3s"/>
    </g>
    <g transform="translate(290, 330)">
      <circle cx="0" cy="0" r="2.5" fill="#ff6b9d" class="sp-pulse" style="animation-delay: 0.7s"/>
    </g>
  </g>

  <!-- Layer 7: Vignette Overlay -->
  <rect width="512" height="512" fill="url(#sp-vignette)" opacity="0.4"/>
</svg>