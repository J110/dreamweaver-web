<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="pf-skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#0a0e2a"/>
    <stop offset="50%" stop-color="#1a103d"/>
    <stop offset="100%" stop-color="#2a124d"/>
  </linearGradient>

  <radialGradient id="pf-auroraGrad" cx="50%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.8"/>
    <stop offset="50%" stop-color="#00ffff" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="pf-oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1a4d80"/>
    <stop offset="50%" stop-color="#2a6b90"/>
    <stop offset="100%" stop-color="#3a89a0"/>
  </linearGradient>

  <linearGradient id="pf-coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff9a8b"/>
    <stop offset="50%" stop-color="#fecfef"/>
    <stop offset="100%" stop-color="#fecfef"/>
  </linearGradient>

  <filter id="pf-softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>

  <filter id="pf-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>

  <filter id="pf-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>

  <radialGradient id="pf-vignette" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="black" stop-opacity="0"/>
    <stop offset="100%" stop-color="black" stop-opacity="0.8"/>
  </radialGradient>

  <pattern id="pf-stars" patternUnits="userSpaceOnUse" width="20" height="20">
    <circle cx="2" cy="2" r="1" fill="white" opacity="0.8"/>
    <circle cx="15" cy="8" r="1.2" fill="white" opacity="0.6"/>
    <circle cx="8" cy="15" r="0.8" fill="white" opacity="0.7"/>
  </pattern>
</defs>

<style>
@keyframes pf-twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}
@keyframes pf-bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes pf-wave {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(10px); }
}
@keyframes pf-drift {
  0% { transform: translate(0, 0); }
  25% { transform: translate(5px, 5px); }
  50% { transform: translate(0, 10px); }
  75% { transform: translate(-5px, 5px); }
  100% { transform: translate(0, 0); }
}
@keyframes pf-pulse {
  0%, 100% { opacity: 0.7; filter: url(#pf-softGlow); }
  50% { opacity: 1; filter: url(#pf-mediumGlow); }
}
@keyframes pf-aurora-swirl {
  0%, 100% { transform: translateX(0) scale(1); }
  50% { transform: translateX(20px) scale(1.1); }
}
@keyframes pf-shell-spin {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(10deg); }
}

.pf-twinkle { animation: pf-twinkle 3s ease-in-out infinite; }
.pf-bob { animation: pf-bob 5s ease-in-out infinite; }
.pf-wave { animation: pf-wave 7s ease-in-out infinite; }
.pf-drift { animation: pf-drift 8s ease-in-out infinite; }
.pf-pulse { animation: pf-pulse 4s ease-in-out infinite; }
.pf-aurora-swirl { animation: pf-aurora-swirl 12s ease-in-out infinite; }
.pf-shell-spin { animation: pf-shell-spin 6s ease-in-out infinite; }
</style>

<!-- Layer 1: Sky/Background -->
<rect width="512" height="512" fill="url(#pf-skyGrad)"/>
<rect width="512" height="512" fill="url(#pf-stars)" opacity="0.5"/>
<circle cx="400" cy="100" r="30" fill="#ffd700" filter="url(#pf-softGlow)" class="pf-twinkle"/>
<circle cx="150" cy="80" r="20" fill="#ffd700" filter="url(#pf-softGlow)" class="pf-twinkle"/>
<circle cx="300" cy="50" r="25" fill="#ffd700" filter="url(#pf-softGlow)" class="pf-twinkle"/>
<ellipse cx="256" cy="150" rx="200" ry="80" fill="url(#pf-auroraGrad)" filter="url(#pf-mediumGlow)" class="pf-aurora-swirl"/>

<!-- Layer 2: Far Background -->
<rect x="0" y="350" width="512" height="162" fill="url(#pf-oceanGrad)"/>
<ellipse cx="100" cy="400" rx="80" ry="20" fill="#1a4d80" opacity="0.7" class="pf-wave"/>
<ellipse cx="400" cy="420" rx="100" ry="25" fill="#1a4d80" opacity="0.7" class="pf-wave"/>
<circle cx="200" cy="380" r="15" fill="#ffd700" filter="url(#pf-softGlow)" class="pf-twinkle"/>
<circle cx="350" cy="400" r="12" fill="#ffd700" filter="url(#pf-softGlow)" class="pf-twinkle"/>

<!-- Layer 3: Mid Background -->
<g transform="translate(150, 300)">
  <g class="pf-wave">
    <path d="M0,0 Q50,-30 100,0 Q150,30 200,0 Q250,-20 300,0 L300,50 L0,50 Z" fill="#3a89a0" opacity="0.8"/>
    <path d="M50,10 Q100,-20 150,10 Q200,40 250,10 Q300,-10 350,10 L350,60 L50,60 Z" fill="#2a6b90" opacity="0.9"/>
  </g>
</g>

<!-- Layer 4: Middle Ground -->
<g transform="translate(100, 250)">
  <g class="pf-bob">
    <path d="M100,50 Q120,20 140,50 Q160,80 180,50 Q200,20 220,50 L220,100 Q200,70 180,100 Q160,130 140,100 Q120,70 100,100 Z" fill="url(#pf-coralGrad)" filter="url(#pf-mediumGlow)"/>
    <circle cx="160" cy="40" r="25" fill="#ffd700" filter="url(#pf-softGlow)"/>
    <rect x="140" y="60" width="40" height="30" rx="15" fill="#ff9a8b" filter="url(#pf-softGlow)"/>
  </g>
</g>

<g transform="translate(300, 280)">
  <g class="pf-bob">
    <path d="M50,30 Q70,0 90,30 Q110,60 130,30 Q150,0 170,30 L170,80 Q150,50 130,80 Q110,110 90,80 Q70,50 50,80 Z" fill="#fecfef" filter="url(#pf-mediumGlow)"/>
    <circle cx="110" cy="20" r="20" fill="#ffd700" filter="url(#pf-softGlow)"/>
  </g>
</g>

<!-- Layer 5: Main Character -->
<g transform="translate(256, 240)">
  <g class="pf-bob">
    <circle cx="0" cy="-30" r="25" fill="#ffd700" filter="url(#pf-strongGlow)"/>
    <path d="M-20,-10 Q0,-30 20,-10 Q30,0 20,20 Q0,30 -20,20 Q-30,0 -20,-10 Z" fill="#ff9a8b"/>
    <circle cx="-10" cy="-20" r="5" fill="white"/>
    <circle cx="10" cy="-20" r="5" fill="white"/>
    <path d="M-10,-15 Q0,-25 10,-15" stroke="black" stroke-width="2" fill="none"/>
    <path d="M-15,0 Q0,10 15,0" stroke="black" stroke-width="2" fill="none"/>
    <path d="M-20,15 Q-10,25 0,15 Q10,25 20,15" stroke="#3a89a0" stroke-width="3" fill="none"/>
    <g transform="translate(0, 30)" class="pf-shell-spin">
      <path d="M-15,0 Q0,-15 15,0 Q0,15 -15,0 Z" fill="#ffd700" filter="url(#pf-mediumGlow)"/>
    </g>
  </g>
</g>

<!-- Layer 6: Foreground Particles/Sparkles -->
<circle cx="50" cy="150" r="3" fill="white" filter="url(#pf-softGlow)" class="pf-drift pf-twinkle"/>
<circle cx="450" cy="200" r="4" fill="white" filter="url(#pf-softGlow)" class="pf-drift pf-twinkle"/>
<circle cx="300" cy="100" r="2" fill="white" filter="url(#pf-softGlow)" class="pf-drift pf-twinkle"/>
<circle cx="100" cy="300" r="3" fill="white" filter="url(#pf-softGlow)" class="pf-drift pf-twinkle"/>
<circle cx="400" cy="350" r="2" fill="white" filter="url(#pf-softGlow)" class="pf-drift pf-twinkle"/>
<circle cx="200" cy="400" r="4" fill="white" filter="url(#pf-softGlow)" class="pf-drift pf-twinkle"/>

<g transform="translate(200, 180)" class="pf-drift">
  <path d="M0,0 L5,10 L10,0 L5,-10 Z" fill="#ffd700" filter="url(#pf-softGlow)"/>
</g>
<g transform="translate(350, 220)" class="pf-drift">
  <path d="M0,0 L4,8 L8,0 L4,-8 Z" fill="#ffd700" filter="url(#pf-softGlow)"/>
</g>

<!-- Layer 7: Vignette Overlay -->
<rect width="512" height="512" fill="url(#pf-vignette)" opacity="0.4"/>
</svg>