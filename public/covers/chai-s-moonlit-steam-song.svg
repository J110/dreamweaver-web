<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <radialGradient id="cm-skyGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="50%" stop-color="#1a103d"/>
      <stop offset="100%" stop-color="#0a0e2a"/>
    </radialGradient>

    <linearGradient id="cm-moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f8ff"/>
      <stop offset="100%" stop-color="#e6e6fa"/>
    </linearGradient>

    <linearGradient id="cm-steamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="cm-teacupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0e6d6"/>
      <stop offset="50%" stop-color="#e8d5c4"/>
      <stop offset="100%" stop-color="#d4c4b0"/>
    </linearGradient>

    <linearGradient id="cm-tableGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a3921"/>
      <stop offset="100%" stop-color="#3a2212"/>
    </linearGradient>

    <radialGradient id="cm-glowGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="cm-vignette" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="cm-softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="cm-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="cm-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="cm-steamBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <style>
    @keyframes cm-starTwinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .cm-starTwinkle {
      animation: cm-starTwinkle 2s infinite ease-in-out;
    }

    @keyframes cm-moonPulse {
      0%, 100% { filter: url(#cm-softGlow); }
      50% { filter: url(#cm-mediumGlow); }
    }
    .cm-moonPulse {
      animation: cm-moonPulse 5s infinite ease-in-out;
    }

    @keyframes cm-characterBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .cm-characterBob {
      animation: cm-characterBob 4s infinite ease-in-out;
    }

    @keyframes cm-steamRise {
      0% { transform: translateY(0) scaleY(1); opacity: 0.7; }
      100% { transform: translateY(-30px) scaleY(1.2); opacity: 0; }
    }
    .cm-steamRise {
      animation: cm-steamRise 6s infinite ease-in-out;
    }

    @keyframes cm-leafFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }
    .cm-leafFloat {
      animation: cm-leafFloat 7s infinite ease-in-out;
    }

    @keyframes cm-particleDrift {
      0% { transform: translate(0, 0) scale(1); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translate(10px, -20px) scale(0.5); opacity: 0; }
    }
    .cm-particleDrift {
      animation: cm-particleDrift 8s infinite ease-in-out;
    }

    @keyframes cm-cloudDrift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(15px); }
    }
    .cm-cloudDrift {
      animation: cm-cloudDrift 12s infinite ease-in-out;
    }

    @keyframes cm-glowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.9; }
    }
    .cm-glowPulse {
      animation: cm-glowPulse 3s infinite ease-in-out;
    }
  </style>

  <!-- Layer 1: Sky/Background -->
  <rect width="512" height="512" fill="url(#cm-skyGrad)"/>

  <!-- Stars -->
  <g>
    <circle cx="80" cy="60" r="1.5" fill="#ffffff" class="cm-starTwinkle" style="animation-delay: 0s"/>
    <circle cx="150" cy="40" r="1.2" fill="#ffffff" class="cm-starTwinkle" style="animation-delay: 0.5s"/>
    <circle cx="220" cy="80" r="1.8" fill="#ffffff" class="cm-starTwinkle" style="animation-delay: 1s"/>
    <circle cx="300" cy="30" r="1.3" fill="#ffffff" class="cm-starTwinkle" style="animation-delay: 1.5s"/>
    <circle cx="380" cy="70" r="1.6" fill="#ffffff" class="cm-starTwinkle" style="animation-delay: 2s"/>
    <circle cx="450" cy="50" r="1.4" fill="#ffffff" class="cm-starTwinkle" style="animation-delay: 2.5s"/>
    <circle cx="120" cy="120" r="1.7" fill="#ffffff" class="cm-starTwinkle" style="animation-delay: 0.3s"/>
    <circle cx="350" cy="140" r="1.5" fill="#ffffff" class="cm-starTwinkle" style="animation-delay: 0.8s"/>
    <circle cx="480" cy="110" r="1.2" fill="#ffffff" class="cm-starTwinkle" style="animation-delay: 1.3s"/>
  </g>

  <!-- Moon -->
  <g transform="translate(400, 100)">
    <circle r="40" fill="url(#cm-moonGrad)" class="cm-moonPulse"/>
    <circle r="35" fill="none" stroke="#f8f8ff" stroke-width="2" stroke-opacity="0.3"/>
  </g>

  <!-- Layer 2: Far Background -->
  <g>
    <!-- Distant trees -->
    <path d="M0,350 Q50,300 100,350 L100,512 L0,512 Z" fill="#1a2e1a"/>
    <path d="M100,360 Q150,310 200,360 L200,512 L100,512 Z" fill="#1a2e1a"/>
    <path d="M200,340 Q250,290 300,340 L300,512 L200,512 Z" fill="#1a2e1a"/>
    <path d="M300,370 Q350,320 400,370 L400,512 L300,512 Z" fill="#1a2e1a"/>
    <path d="M400,350 Q450,300 500,350 L512,512 L400,512 Z" fill="#1a2e1a"/>

    <!-- Distant mountains -->
    <path d="M0,300 Q100,250 200,300 L200,512 L0,512 Z" fill="#2a1e3a"/>
    <path d="M200,280 Q300,230 400,280 L400,512 L200,512 Z" fill="#2a1e3a"/>
    <path d="M400,320 Q450,270 512,320 L512,512 L400,512 Z" fill="#2a1e3a"/>

    <!-- Clouds -->
    <g class="cm-cloudDrift">
      <path d="M50,150 Q80,130 110,150 Q120,140 130,160 Q140,150 150,170 Q160,160 170,180 Q150,170 140,190 Q120,180 100,190 Q80,180 70,200 Q50,190 50,170 Z" fill="#ffffff" opacity="0.6"/>
      <path d="M350,120 Q380,100 410,120 Q420,110 430,130 Q440,120 450,140 Q460,130 470,150 Q450,140 440,160 Q420,150 400,160 Q380,150 370,170 Q350,160 350,140 Z" fill="#ffffff" opacity="0.6"/>
    </g>
  </g>

  <!-- Layer 3: Mid Background -->
  <g>
    <!-- Window frame -->
    <rect x="150" y="200" width="212" height="150" fill="#3a2212" rx="5"/>
    <rect x="155" y="205" width="202" height="140" fill="#1a0a0a" rx="3"/>

    <!-- Window light glow -->
    <rect x="160" y="210" width="192" height="130" fill="#ffd700" opacity="0.1" class="cm-glowPulse" filter="url(#cm-softGlow)"/>

    <!-- Curtains -->
    <path d="M150,200 Q180,180 200,200 L200,350 Q180,370 150,350 Z" fill="#5a3921" opacity="0.7"/>
    <path d="M312,200 Q342,180 362,200 L362,350 Q342,370 312,350 Z" fill="#5a3921" opacity="0.7"/>
  </g>

  <!-- Layer 4: Middle Ground -->
  <g>
    <!-- Table -->
    <path d="M100,380 Q256,350 412,380 L450,512 L62,512 Z" fill="url(#cm-tableGrad)"/>

    <!-- Table details -->
    <rect x="120" y="380" width="272" height="20" fill="#3a2212"/>
    <rect x="130" y="400" width="252" height="10" fill="#2a120a"/>

    <!-- Window sill -->
    <rect x="140" y="340" width="232" height="10" fill="#3a2212"/>
    <rect x="145" y="350" width="222" height="5" fill="#2a120a"/>

    <!-- Leaves on sill -->
    <g transform="translate(160, 335)">
      <g class="cm-leafFloat">
        <path d="M0,0 Q5,-10 10,0 Q5,5 0,0 Z" fill="#2a5a2a"/>
        <path d="M12,0 Q17,-8 22,0 Q17,4 12,0 Z" fill="#3a6a3a"/>
      </g>
    </g>
    <g transform="translate(300, 330)">
      <g class="cm-leafFloat" style="animation-delay: 2s">
        <path d="M0,0 Q5,-12 10,0 Q5,6 0,0 Z" fill="#2a5a2a"/>
      </g>
    </g>
  </g>

  <!-- Layer 5: Main Character -->
  <g transform="translate(256, 240)">
    <g class="cm-characterBob">
      <!-- Teacup body -->
      <path d="M-40,0 Q-30,-30 0,-40 Q30,-30 40,0 Q30,30 0,40 Q-30,30 -40,0 Z" fill="url(#cm-teacupGrad)" stroke="#3a2212" stroke-width="1.5"/>

      <!-- Teacup handle -->
      <path d="M30,-10 Q45,0 30,10 Q35,0 30,-10 Z" fill="url(#cm-teacupGrad)" stroke="#3a2212" stroke-width="1"/>

      <!-- Steam -->
      <g>
        <g transform="translate(-15, -30)" class="cm-steamRise">
          <path d="M0,0 Q5,-10 10,-5 Q15,-10 20,0 Q15,5 10,10 Q5,5 0,0 Z" fill="url(#cm-steamGrad)" filter="url(#cm-steamBlur)"/>
        </g>
        <g transform="translate(0, -35)" class="cm-steamRise" style="animation-delay: 1s">
          <path d="M0,0 Q3,-8 6,-3 Q9,-8 12,0 Q9,3 6,8 Q3,3 0,0 Z" fill="url(#cm-steamGrad)" filter="url(#cm-steamBlur)"/>
        </g>
        <g transform="translate(15, -28)" class="cm-steamRise" style="animation-delay: 2s">
          <path d="M0,0 Q4,-6 8,-2 Q12,-6 16,0 Q12,2 8,6 Q4,2 0,0 Z" fill="url(#cm-steamGrad)" filter="url(#cm-steamBlur)"/>
        </g>
      </g>

      <!-- Face -->
      <circle cx="-15" cy="-5" r="3" fill="#3a2212"/>
      <circle cx="15" cy="-5" r="3" fill="#3a2212"/>
      <path d="M-10,10 Q0,15 10,10" stroke="#3a2212" stroke-width="1.5" fill="none"/>

      <!-- Glow around teacup -->
      <circle r="60" fill="url(#cm-glowGrad)" opacity="0.3" class="cm-glowPulse" filter="url(#cm-softGlow)"/>
    </g>
  </g>

  <!-- Layer 6: Foreground Particles/Sparkles -->
  <g>
    <!-- Floating particles -->
    <g transform="translate(180, 150)">
      <circle r="1.5" fill="#ffd700" class="cm-particleDrift" style="animation-delay: 0s"/>
    </g>
    <g transform="translate(220, 120)">
      <circle r="1.2" fill="#ffd700" class="cm-particleDrift" style="animation-delay: 1s"/>
    </g>
    <g transform="translate(280, 140)">
      <circle r="1.8" fill="#ffd700" class="cm-particleDrift" style="animation-delay: 2s"/>
    </g>
    <g transform="translate(320, 100)">
      <circle r="1.3" fill="#ffd700" class="cm-particleDrift" style="animation-delay: 3s"/>
    </g>
    <g transform="translate(360, 130)">
      <circle r="1.6" fill="#ffd700" class="cm-particleDrift" style="animation-delay: 4s"/>
    </g>

    <!-- Sparkles -->
    <g transform="translate(200, 200)">
      <path d="M0,-3 L1,-1 L3,-1 L1.5,1 L2,3 L0,2 L-2,3 L-1.5,1 L-3,-1 L-1,-1 Z" fill="#ffd700" class="cm-starTwinkle" style="animation-delay: 0.2s"/>
    </g>
    <g transform="translate(300, 180)">
      <path d="M0,-2 L0.5,-0.5 L2,-0.5 L1,0.5 L1.5,2 L0,1.5 L-1.5,2 L-1,0.5 L-2,-0.5 L-0.5,-0.5 Z" fill="#ffd700" class="cm-starTwinkle" style="animation-delay: 0.7s"/>
    </g>
    <g transform="translate(250, 250)">
      <path d="M0,-2.5 L0.8,-0.8 L2.5,-0.8 L1.2,0.5 L1.8,2.2 L0,1.8 L-1.8,2.2 L-1.2,0.5 L-2.5,-0.8 L-0.8,-0.8 Z" fill="#ffd700" class="cm-starTwinkle" style="animation-delay: 1.2s"/>
    </g>
  </g>

  <!-- Layer 7: Vignette Overlay -->
  <rect width="512" height="512" fill="url(#cm-vignette)" opacity="0.4"/>
</svg>