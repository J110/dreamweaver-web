<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <radialGradient id="pw-skyGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="50%" stop-color="#1a103d"/>
      <stop offset="100%" stop-color="#2d0b4a"/>
    </radialGradient>

    <linearGradient id="pw-wellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a2e1d"/>
      <stop offset="50%" stop-color="#5a4a32"/>
      <stop offset="100%" stop-color="#3a2e1d"/>
    </linearGradient>

    <linearGradient id="pw-stoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec8b"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>

    <linearGradient id="pw-vignette" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.8)"/>
    </linearGradient>

    <linearGradient id="pw-waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a1a2a" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="pw-softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="pw-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="pw-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="pw-waterRipple" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.05" numOctaves="2" result="turbulence"/>
      <feDisplacementMap in2="turbulence" in="SourceGraphic" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <style>
    @keyframes pw-twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .pw-twinkle { animation: pw-twinkle 2s ease-in-out infinite; }

    @keyframes pw-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .pw-bob { animation: pw-bob 5s ease-in-out infinite; }

    @keyframes pw-cloudDrift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(20px); }
    }
    .pw-cloudDrift { animation: pw-cloudDrift 8s ease-in-out infinite; }

    @keyframes pw-particleDrift {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(5px, -5px) rotate(90deg); }
      50% { transform: translate(10px, 0) rotate(180deg); }
      75% { transform: translate(5px, 5px) rotate(270deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }
    .pw-particleDrift { animation: pw-particleDrift 7s ease-in-out infinite; }

    @keyframes pw-pulse {
      0%, 100% { opacity: 0.7; filter: url(#pw-softGlow); }
      50% { opacity: 1; filter: url(#pw-mediumGlow); }
    }
    .pw-pulse { animation: pw-pulse 4s ease-in-out infinite; }

    @keyframes pw-waterFlow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .pw-waterFlow { animation: pw-waterFlow 6s ease-in-out infinite; }

    @keyframes pw-leafSway {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }
    .pw-leafSway { animation: pw-leafSway 7s ease-in-out infinite; }

    @keyframes pw-stoneGlow {
      0%, 100% { filter: url(#pw-mediumGlow); }
      50% { filter: url(#pw-strongGlow); }
    }
    .pw-stoneGlow { animation: pw-stoneGlow 5s ease-in-out infinite; }
  </style>

  <!-- Layer 1: Sky/Background -->
  <rect width="512" height="512" fill="url(#pw-skyGrad)"/>

  <!-- Stars -->
  <g>
    <circle cx="50" cy="80" r="1.5" fill="#fff" class="pw-twinkle" style="animation-delay: 0s"/>
    <circle cx="120" cy="40" r="1" fill="#fff" class="pw-twinkle" style="animation-delay: 0.5s"/>
    <circle cx="200" cy="70" r="1.2" fill="#fff" class="pw-twinkle" style="animation-delay: 1s"/>
    <circle cx="300" cy="30" r="1.5" fill="#fff" class="pw-twinkle" style="animation-delay: 1.5s"/>
    <circle cx="400" cy="90" r="1" fill="#fff" class="pw-twinkle" style="animation-delay: 2s"/>
    <circle cx="450" cy="50" r="1.2" fill="#fff" class="pw-twinkle" style="animation-delay: 2.5s"/>
    <circle cx="150" cy="120" r="1.5" fill="#fff" class="pw-twinkle" style="animation-delay: 0.3s"/>
    <circle cx="350" cy="150" r="1" fill="#fff" class="pw-twinkle" style="animation-delay: 0.8s"/>
  </g>

  <!-- Distant mountains -->
  <path d="M0,300 Q100,250 200,280 Q300,260 400,290 Q500,270 512,300 L512,512 L0,512 Z" fill="#1a103d" opacity="0.7"/>

  <!-- Layer 2: Far Background -->
  <g class="pw-cloudDrift">
    <path d="M50,150 Q100,120 150,140 Q200,110 250,130 Q300,100 350,120 Q400,90 450,110 Q500,80 512,100 L512,200 Q500,180 450,190 Q400,170 350,180 Q300,160 250,170 Q200,150 150,160 Q100,140 50,150 Z" fill="#a8b8d8" opacity="0.6"/>
  </g>

  <!-- Layer 3: Mid Background -->
  <g>
    <!-- Trees -->
    <path d="M100,350 Q110,300 120,350 Q130,300 140,350 L140,450 L100,450 Z" fill="#2a3a2a"/>
    <path d="M110,320 Q120,280 130,320" fill="#4a5a3a" class="pw-leafSway"/>
    <path d="M130,340 Q140,300 150,340" fill="#4a5a3a" class="pw-leafSway" style="animation-delay: 1s"/>

    <path d="M350,330 Q360,280 370,330 Q380,280 390,330 L390,450 L350,450 Z" fill="#2a3a2a"/>
    <path d="M360,300 Q370,260 380,300" fill="#4a5a3a" class="pw-leafSway" style="animation-delay: 0.5s"/>

    <!-- Well structure -->
    <ellipse cx="256" cy="400" rx="80" ry="30" fill="url(#pw-wellGrad)"/>
    <rect x="180" y="370" width="152" height="60" rx="10" fill="#3a2e1d"/>
    <rect x="190" y="380" width="132" height="40" rx="5" fill="#5a4a32"/>
  </g>

  <!-- Layer 4: Middle Ground -->
  <g>
    <!-- Water in well -->
    <ellipse cx="256" cy="400" rx="60" ry="20" fill="url(#pw-waterGrad)" filter="url(#pw-waterRipple)" class="pw-waterFlow"/>

    <!-- Glowing stones -->
    <g transform="translate(230, 380)">
      <circle cx="0" cy="0" r="12" fill="url(#pw-stoneGrad)" class="pw-stoneGlow"/>
      <circle cx="20" cy="-5" r="10" fill="url(#pw-stoneGrad)" class="pw-stoneGlow" style="animation-delay: 1s"/>
      <circle cx="15" cy="10" r="8" fill="url(#pw-stoneGrad)" class="pw-stoneGlow" style="animation-delay: 2s"/>
    </g>

    <!-- Well rope -->
    <path d="M256,200 Q260,250 256,300 Q252,350 256,400" stroke="#5a4a32" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Layer 5: Main Character -->
  <g transform="translate(256, 240)">
    <g class="pw-bob">
      <!-- Priya's body -->
      <path d="M-20,20 Q-15,0 0,-30 Q15,0 20,20 Q10,40 -10,40 Z" fill="#8b4a8c"/>
      <!-- Head -->
      <circle cx="0" cy="-40" r="15" fill="#f5d5b0"/>
      <!-- Hair -->
      <path d="M-15,-50 Q0,-60 15,-50 Q10,-45 0,-40 Q-10,-45 -15,-50" fill="#3a2a1a"/>
      <!-- Eyes -->
      <circle cx="-5" cy="-42" r="2" fill="#2a1a0a"/>
      <circle cx="5" cy="-42" r="2" fill="#2a1a0a"/>
      <!-- Mouth -->
      <path d="M-3,-35 Q0,-32 3,-35" stroke="#2a1a0a" stroke-width="1" fill="none"/>
      <!-- Arms -->
      <path d="M-25,10 Q-35,0 -25,-10" stroke="#8b4a8c" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M25,10 Q35,0 25,-10" stroke="#8b4a8c" stroke-width="8" fill="none" stroke-linecap="round"/>
      <!-- Hands -->
      <circle cx="-25" cy="-10" r="3" fill="#f5d5b0"/>
      <circle cx="25" cy="-10" r="3" fill="#f5d5b0"/>
      <!-- Dress details -->
      <path d="M-15,20 Q0,25 15,20" stroke="#6a2a6c" stroke-width="2" fill="none"/>
      <!-- Holding glowing stone -->
      <circle cx="28" cy="-8" r="6" fill="url(#pw-stoneGrad)" class="pw-pulse"/>
    </g>
  </g>

  <!-- Layer 6: Foreground Particles/Sparkles -->
  <g>
    <!-- Floating sparkles -->
    <g class="pw-particleDrift">
      <circle cx="100" cy="200" r="2" fill="#ffd700" opacity="0.8"/>
      <circle cx="400" cy="180" r="1.5" fill="#ffec8b" opacity="0.8"/>
      <circle cx="150" cy="150" r="2.5" fill="#ffd700" opacity="0.8"/>
      <circle cx="350" cy="120" r="1.8" fill="#ffec8b" opacity="0.8"/>
      <circle cx="200" cy="100" r="2" fill="#ffd700" opacity="0.8"/>
      <circle cx="300" cy="80" r="1.5" fill="#ffec8b" opacity="0.8"/>
    </g>

    <!-- Well mist -->
    <ellipse cx="256" cy="380" rx="50" ry="15" fill="#a8b8d8" opacity="0.2" class="pw-waterFlow" style="animation-delay: 1s"/>
  </g>

  <!-- Layer 7: Vignette Overlay -->
  <rect width="512" height="512" fill="url(#pw-vignette)" opacity="0.4"/>
</svg>