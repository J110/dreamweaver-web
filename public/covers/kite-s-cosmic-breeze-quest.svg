<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
    <radialGradient id="kc-skyGrad" cx="50%" cy="50%" r="70%">
        <stop offset="0%" stop-color="#0a0e2a"/>
        <stop offset="50%" stop-color="#1a103d"/>
        <stop offset="100%" stop-color="#0a0e2a"/>
    </radialGradient>

    <linearGradient id="kc-kiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffd700"/>
        <stop offset="50%" stop-color="#ff6b6b"/>
        <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <linearGradient id="kc-gardenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#10b981"/>
        <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <filter id="kc-softGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="kc-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="kc-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <radialGradient id="kc-vignette" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="black" stop-opacity="0"/>
        <stop offset="100%" stop-color="black" stop-opacity="1"/>
    </radialGradient>

    <pattern id="kc-stars" patternUnits="userSpaceOnUse" width="20" height="20">
        <circle cx="10" cy="10" r="1" fill="white" opacity="0.8"/>
    </pattern>
</defs>

<style>
    @keyframes kc-starTwinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
    }
    .kc-star-twinkle {
        animation: kc-starTwinkle 3s ease-in-out infinite;
    }

    @keyframes kc-kiteBob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    .kc-kite-bob {
        animation: kc-kiteBob 5s ease-in-out infinite;
    }

    @keyframes kc-cloudDrift {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(15px); }
    }
    .kc-cloud-drift {
        animation: kc-cloudDrift 7s ease-in-out infinite;
    }

    @keyframes kc-particleDrift {
        0% { transform: translate(0, 0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translate(20px, -30px); opacity: 0; }
    }
    .kc-particle-drift {
        animation: kc-particleDrift 8s ease-in-out infinite;
    }

    @keyframes kc-pulseGlow {
        0%, 100% { filter: url(#kc-softGlow); }
        50% { filter: url(#kc-mediumGlow); }
    }
    .kc-pulse-glow {
        animation: kc-pulseGlow 4s ease-in-out infinite;
    }

    @keyframes kc-leafSway {
        0%, 100% { transform: rotate(-5deg); }
        50% { transform: rotate(5deg); }
    }
    .kc-leaf-sway {
        animation: kc-leafSway 6s ease-in-out infinite;
    }

    @keyframes kc-tailFloat {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(3deg); }
    }
    .kc-tail-float {
        animation: kc-tailFloat 4.5s ease-in-out infinite;
    }
</style>

<!-- Layer 1: Sky/Background -->
<rect width="512" height="512" fill="url(#kc-skyGrad)"/>
<rect width="512" height="512" fill="url(#kc-stars)" opacity="0.3"/>
<circle cx="100" cy="80" r="2" fill="white" class="kc-star-twinkle"/>
<circle cx="400" cy="60" r="2" fill="white" class="kc-star-twinkle" style="animation-delay: 0.5s"/>
<circle cx="200" cy="120" r="1.5" fill="white" class="kc-star-twinkle" style="animation-delay: 1s"/>
<circle cx="350" cy="150" r="1.5" fill="white" class="kc-star-twinkle" style="animation-delay: 1.5s"/>
<circle cx="150" cy="200" r="1" fill="white" class="kc-star-twinkle" style="animation-delay: 2s"/>

<!-- Layer 2: Far Background -->
<g transform="translate(0, 50)">
    <ellipse cx="100" cy="400" rx="120" ry="40" fill="#1f2937" opacity="0.6" class="kc-cloud-drift"/>
    <ellipse cx="400" cy="380" rx="100" ry="35" fill="#1f2937" opacity="0.5" class="kc-cloud-drift" style="animation-delay: 1s"/>
    <ellipse cx="250" cy="420" rx="140" ry="30" fill="#111827" opacity="0.7" class="kc-cloud-drift" style="animation-delay: 2s"/>
</g>

<!-- Layer 3: Mid Background -->
<g transform="translate(0, 100)">
    <circle cx="50" cy="350" r="30" fill="#374151" opacity="0.4" class="kc-cloud-drift"/>
    <circle cx="450" cy="320" r="25" fill="#374151" opacity="0.3" class="kc-cloud-drift" style="animation-delay: 0.5s"/>
    <circle cx="200" cy="380" r="20" fill="#374151" opacity="0.5" class="kc-cloud-drift" style="animation-delay: 1.5s"/>

    <!-- Celestial Gardens in distance -->
    <g transform="translate(150, 300)">
        <rect x="0" y="50" width="200" height="80" rx="10" fill="url(#kc-gardenGrad)" opacity="0.7"/>
        <circle cx="50" cy="40" r="15" fill="#10b981" opacity="0.8" class="kc-pulse-glow"/>
        <circle cx="150" cy="30" r="12" fill="#10b981" opacity="0.8" class="kc-pulse-glow" style="animation-delay: 1s"/>
        <circle cx="100" cy="60" r="10" fill="#10b981" opacity="0.8" class="kc-pulse-glow" style="animation-delay: 2s"/>
    </g>
</g>

<!-- Layer 4: Middle Ground -->
<g transform="translate(0, 50)">
    <!-- Floating islands -->
    <path d="M100,250 Q150,220 200,250 Q250,280 300,250 Q350,220 400,250 L400,350 Q350,320 300,350 Q250,380 200,350 Q150,320 100,350 Z" fill="#374151" opacity="0.6"/>
    <path d="M50,300 Q100,280 150,300 Q200,320 250,300 L250,380 Q200,360 150,380 Q100,360 50,380 Z" fill="#1f2937" opacity="0.5"/>

    <!-- Tiny glowing plants -->
    <circle cx="120" cy="320" r="3" fill="#8b5cf6" class="kc-pulse-glow"/>
    <circle cx="380" cy="310" r="3" fill="#ffd700" class="kc-pulse-glow" style="animation-delay: 0.5s"/>
    <circle cx="250" cy="330" r="2.5" fill="#10b981" class="kc-pulse-glow" style="animation-delay: 1s"/>
</g>

<!-- Layer 5: Main Character -->
<g transform="translate(256, 240)">
    <g class="kc-kite-bob">
        <!-- Kite body -->
        <path d="M0,-60 L30,0 L0,60 L-30,0 Z" fill="url(#kc-kiteGrad)" filter="url(#kc-softGlow)"/>

        <!-- Kite tail -->
        <g transform="translate(0, 60)">
            <g class="kc-tail-float">
                <path d="M0,0 Q10,15 0,30 Q-10,45 0,60" stroke="#ffd700" stroke-width="2" fill="none" stroke-linecap="round"/>
                <circle cx="0" cy="15" r="3" fill="#ffd700"/>
                <circle cx="0" cy="45" r="3" fill="#ff6b6b"/>
            </g>
        </g>

        <!-- Kite details -->
        <circle cx="0" cy="-20" r="4" fill="#ffffff" opacity="0.9"/>
        <path d="M-8,-30 Q0,-40 8,-30" stroke="#ffffff" stroke-width="1.5" fill="none"/>
        <path d="M-5,-10 L5,-10" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    </g>
</g>

<!-- Layer 6: Foreground Particles/Sparkles -->
<g>
    <circle cx="150" cy="100" r="2" fill="#ffd700" class="kc-particle-drift" style="animation-delay: 0s"/>
    <circle cx="350" cy="80" r="1.5" fill="#8b5cf6" class="kc-particle-drift" style="animation-delay: 1s"/>
    <circle cx="200" cy="150" r="2" fill="#10b981" class="kc-particle-drift" style="animation-delay: 2s"/>
    <circle cx="400" cy="120" r="1.5" fill="#ff6b6b" class="kc-particle-drift" style="animation-delay: 3s"/>
    <circle cx="100" cy="200" r="2" fill="#ffffff" class="kc-particle-drift" style="animation-delay: 4s"/>

    <!-- Floating leaves -->
    <g transform="translate(50, 250)">
        <g class="kc-leaf-sway">
            <path d="M0,0 Q10,-15 20,0 Q10,15 0,0" fill="#10b981" opacity="0.7"/>
        </g>
    </g>
    <g transform="translate(450, 280)">
        <g class="kc-leaf-sway" style="animation-delay: 1s">
            <path d="M0,0 Q8,-12 16,0 Q8,12 0,0" fill="#10b981" opacity="0.7"/>
        </g>
    </g>
    <g transform="translate(300, 200)">
        <g class="kc-leaf-sway" style="animation-delay: 2s">
            <path d="M0,0 Q12,-18 24,0 Q12,18 0,0" fill="#10b981" opacity="0.7"/>
        </g>
    </g>
</g>

<!-- Layer 7: Vignette Overlay -->
<rect width="512" height="512" fill="url(#kc-vignette)" opacity="0.4"/>
</svg>