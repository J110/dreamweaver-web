<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sy-skyGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1a2a"/>
      <stop offset="50%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>

    <linearGradient id="sy-auroraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a4c93" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#88d3ce" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0.4"/>
    </linearGradient>

    <filter id="sy-softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="sy-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="sy-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <radialGradient id="sy-vignette" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
    </radialGradient>

    <filter id="sy-sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feSpecularLighting result="specOut" in="blur" specularConstant="1" specularExponent="20" lighting-color="#ffd700">
        <fePointLight x="0" y="0" z="200"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>

  <style>
    @keyframes sy-twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .sy-twinkle { animation: sy-twinkle 3s ease-in-out infinite; }

    @keyframes sy-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .sy-bob { animation: sy-bob 5s ease-in-out infinite; }

    @keyframes sy-auroraPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.9; }
    }
    .sy-auroraPulse { animation: sy-auroraPulse 7s ease-in-out infinite; }

    @keyframes sy-snowDrift {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(2px, 2px); }
      50% { transform: translate(-2px, 4px); }
      75% { transform: translate(1px, 1px); }
    }
    .sy-snowDrift { animation: sy-snowDrift 8s ease-in-out infinite; }

    @keyframes sy-glowPulse {
      0%, 100% { filter: url(#sy-softGlow); }
      50% { filter: url(#sy-mediumGlow); }
    }
    .sy-glowPulse { animation: sy-glowPulse 4s ease-in-out infinite; }

    @keyframes sy-iceShimmer {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    .sy-iceShimmer { animation: sy-iceShimmer 6s ease-in-out infinite; }

    @keyframes sy-friendBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .sy-friendBob { animation: sy-friendBob 6s ease-in-out infinite; }
  </style>

  <!-- Layer 1: Sky/Background -->
  <rect width="512" height="512" fill="url(#sy-skyGrad)"/>

  <!-- Aurora Borealis -->
  <path d="M0,150 Q128,100 256,120 Q384,140 512,110 L512,0 L0,0 Z" fill="url(#sy-auroraGrad)" class="sy-auroraPulse"/>

  <!-- Distant stars -->
  <g>
    <circle cx="80" cy="60" r="1.5" fill="#ffffff" class="sy-twinkle" style="animation-delay: 0.5s"/>
    <circle cx="150" cy="40" r="1" fill="#ffffff" class="sy-twinkle" style="animation-delay: 1s"/>
    <circle cx="300" cy="70" r="1.2" fill="#ffffff" class="sy-twinkle" style="animation-delay: 1.5s"/>
    <circle cx="420" cy="50" r="1.8" fill="#ffffff" class="sy-twinkle" style="animation-delay: 2s"/>
    <circle cx="200" cy="30" r="1" fill="#ffd700" class="sy-twinkle" style="animation-delay: 0.8s"/>
    <circle cx="350" cy="20" r="1.3" fill="#88d3ce" class="sy-twinkle" style="animation-delay: 1.2s"/>
  </g>

  <!-- Layer 2: Far Background -->
  <g>
    <!-- Distant mountains -->
    <path d="M0,300 Q64,250 128,280 Q192,310 256,270 Q320,230 384,260 Q448,290 512,240 L512,512 L0,512 Z" fill="#1a2a3a"/>
    <path d="M0,350 Q128,300 256,320 Q384,340 512,310 L512,512 L0,512 Z" fill="#2a3a4a"/>

    <!-- Distant icebergs -->
    <ellipse cx="100" cy="400" rx="40" ry="20" fill="#a0d2eb" opacity="0.6" class="sy-iceShimmer"/>
    <ellipse cx="400" cy="380" rx="50" ry="25" fill="#a0d2eb" opacity="0.6" class="sy-iceShimmer"/>
  </g>

  <!-- Layer 3: Mid Background -->
  <g>
    <!-- Northern lights reflection on ice -->
    <path d="M0,450 Q128,430 256,440 Q384,450 512,420 L512,512 L0,512 Z" fill="#6a4c93" opacity="0.2" class="sy-auroraPulse"/>

    <!-- Snow-covered ground -->
    <path d="M0,480 Q128,460 256,470 Q384,480 512,450 L512,512 L0,512 Z" fill="#e6f7ff"/>

    <!-- Ice formations -->
    <path d="M50,420 Q100,400 150,410 Q200,420 250,400 Q300,380 350,390 Q400,400 450,380" stroke="#a0d2eb" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M80,440 Q130,420 180,430 Q230,440 280,420 Q330,400 380,410" stroke="#a0d2eb" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Layer 4: Middle Ground -->
  <g>
    <!-- Snow drifts -->
    <path d="M0,460 Q64,440 128,450 Q192,460 256,440 Q320,420 384,430 Q448,440 512,420 L512,512 L0,512 Z" fill="#ffffff" opacity="0.8"/>

    <!-- Ice crystals -->
    <g transform="translate(150, 400)">
      <path d="M0,0 L10,0 L5,15 Z" fill="#a0d2eb" filter="url(#sy-softGlow)" class="sy-snowDrift" style="animation-delay: 0.3s"/>
    </g>
    <g transform="translate(350, 380)">
      <path d="M0,0 L12,0 L6,18 Z" fill="#a0d2eb" filter="url(#sy-softGlow)" class="sy-snowDrift" style="animation-delay: 0.6s"/>
    </g>
    <g transform="translate(250, 350)">
      <path d="M0,0 L8,0 L4,12 Z" fill="#a0d2eb" filter="url(#sy-softGlow)" class="sy-snowDrift" style="animation-delay: 0.9s"/>
    </g>

    <!-- Sylvie's friends -->
    <!-- Arctic fox -->
    <g transform="translate(100, 420)">
      <g class="sy-friendBob">
        <path d="M20,0 Q25,-10 30,-5 Q35,0 30,5 Q25,10 20,5 Q15,10 10,5 Q5,0 10,-5 Q15,-10 20,0 Z" fill="#f8f8f8"/>
        <path d="M25,-3 L28,-6 L30,-3" fill="#333"/>
        <path d="M25,3 L28,6 L30,3" fill="#333"/>
        <circle cx="22" cy="0" r="1.5" fill="#333"/>
        <path d="M10,-2 Q15,-5 20,-2" stroke="#333" stroke-width="1" fill="none"/>
      </g>
    </g>

    <!-- Snowy owl -->
    <g transform="translate(400, 350)">
      <g class="sy-friendBob">
        <circle cx="0" cy="0" r="15" fill="#f0f0f0"/>
        <path d="M-10,-5 Q0,-15 10,-5 Q0,5 -10,-5" fill="#e0e0e0"/>
        <circle cx="-5" cy="-3" r="3" fill="#333"/>
        <circle cx="5" cy="-3" r="3" fill="#333"/>
        <path d="M-2,-1 L2,-1 L0,-5 Z" fill="#ffd700"/>
        <path d="M-8,5 L-5,8 L-2,5" fill="#333"/>
        <path d="M8,5 L5,8 L2,5" fill="#333"/>
      </g>
    </g>
  </g>

  <!-- Layer 5: Main Character -->
  <g transform="translate(256, 240)">
    <g class="sy-bob sy-glowPulse">
      <!-- Sylvie's body -->
      <ellipse cx="0" cy="20" rx="12" ry="25" fill="#a0d2eb" filter="url(#sy-mediumGlow)"/>

      <!-- Head -->
      <circle cx="0" cy="-5" r="10" fill="#d4f1f9"/>

      <!-- Antennae -->
      <path d="M-5,-15 Q-8,-20 -10,-15" stroke="#6a4c93" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M5,-15 Q8,-20 10,-15" stroke="#6a4c93" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="-10" cy="-15" r="1.5" fill="#ffd700"/>
      <circle cx="10" cy="-15" r="1.5" fill="#ffd700"/>

      <!-- Eyes -->
      <circle cx="-4" cy="-3" r="2" fill="#333"/>
      <circle cx="4" cy="-3" r="2" fill="#333"/>
      <circle cx="-4" cy="-3" r="0.8" fill="#ffffff"/>
      <circle cx="4" cy="-3" r="0.8" fill="#ffffff"/>

      <!-- Smile -->
      <path d="M-3,2 Q0,5 3,2" stroke="#333" stroke-width="1" fill="none"/>

      <!-- Legs -->
      <path d="M-8,25 Q-10,35 -8,45" stroke="#6a4c93" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M-3,25 Q-5,35 -3,45" stroke="#6a4c93" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M3,25 Q1,35 3,45" stroke="#6a4c93" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M8,25 Q6,35 8,45" stroke="#6a4c93" stroke-width="1.5" fill="none" stroke-linecap="round"/>

      <!-- Frost-spun thread (magic element) -->
      <path d="M0,10 Q-20,0 -30,-10 Q-25,-20 -10,-25 Q0,-30 10,-25 Q25,-20 30,-10 Q20,0 0,10" stroke="#ffd700" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#sy-sparkleGlow)"/>
      <circle cx="-30" cy="-10" r="2" fill="#ffd700" filter="url(#sy-sparkleGlow)"/>
      <circle cx="30" cy="-10" r="2" fill="#ffd700" filter="url(#sy-sparkleGlow)"/>
    </g>
  </g>

  <!-- Layer 6: Foreground Particles/Sparkles -->
  <g>
    <!-- Snowflakes -->
    <g transform="translate(50, 100)">
      <path d="M0,0 L4,0 L2,6 Z" fill="#ffffff" class="sy-snowDrift" style="animation-delay: 0.2s"/>
    </g>
    <g transform="translate(450, 150)">
      <path d="M0,0 L5,0 L2.5,7.5 Z" fill="#ffffff" class="sy-snowDrift" style="animation-delay: 0.5s"/>
    </g>
    <g transform="translate(200, 80)">
      <path d="M0,0 L3,0 L1.5,4.5 Z" fill="#ffffff" class="sy-snowDrift" style="animation-delay: 0.8s"/>
    </g>
    <g transform="translate(350, 200)">
      <path d="M0,0 L6,0 L3,9 Z" fill="#ffffff" class="sy-snowDrift" style="animation-delay: 1.1s"/>
    </g>

    <!-- Sparkles -->
    <g transform="translate(180, 120)">
      <path d="M0,0 L3,3 L0,6 L-3,3 Z" fill="#ffd700" filter="url(#sy-sparkleGlow)" class="sy-twinkle" style="animation-delay: 0.3s"/>
    </g>
    <g transform="translate(320, 180)">
      <path d="M0,0 L4,4 L0,8 L-4,4 Z" fill="#88d3ce" filter="url(#sy-sparkleGlow)" class="sy-twinkle" style="animation-delay: 0.7s"/>
    </g>
    <g transform="translate(100, 250)">
      <path d="M0,0 L2,2 L0,4 L-2,2 Z" fill="#ffd700" filter="url(#sy-sparkleGlow)" class="sy-twinkle" style="animation-delay: 1.2s"/>
    </g>
    <g transform="translate(400, 300)">
      <path d="M0,0 L3,3 L0,6 L-3,3 Z" fill="#88d3ce" filter="url(#sy-sparkleGlow)" class="sy-twinkle" style="animation-delay: 1.5s"/>
    </g>
  </g>

  <!-- Layer 7: Vignette Overlay -->
  <rect width="512" height="512" fill="url(#sy-vignette)" opacity="0.4"/>
</svg>