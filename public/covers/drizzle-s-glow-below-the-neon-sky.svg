<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="dg-skyGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="50%" stop-color="#1a103d"/>
      <stop offset="100%" stop-color="#0a0e2a"/>
    </radialGradient>

    <linearGradient id="dg-neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0.6"/>
    </linearGradient>

    <filter id="dg-softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="dg-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="dg-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <radialGradient id="dg-vignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.8"/>
    </radialGradient>

    <filter id="dg-sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feSpecularLighting result="specOut" in="blur" specularConstant="1" specularExponent="20" lighting-color="#ffd700">
        <fePointLight x="0" y="0" z="200"/>
      </feSpecularLighting>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
  </defs>

  <style>
    @keyframes dg-twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .dg-twinkle {
      animation: dg-twinkle 3s ease-in-out infinite;
    }

    @keyframes dg-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .dg-bob {
      animation: dg-bob 5s ease-in-out infinite;
    }

    @keyframes dg-cloudDrift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(15px); }
    }
    .dg-cloudDrift {
      animation: dg-cloudDrift 8s ease-in-out infinite;
    }

    @keyframes dg-particleDrift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(20px, 30px) rotate(360deg); }
    }
    .dg-particleDrift {
      animation: dg-particleDrift 9s ease-in-out infinite;
    }

    @keyframes dg-pulse {
      0%, 100% { opacity: 0.7; filter: url(#dg-softGlow); }
      50% { opacity: 1; filter: url(#dg-mediumGlow); }
    }
    .dg-pulse {
      animation: dg-pulse 4s ease-in-out infinite;
    }

    @keyframes dg-neonFlicker {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    .dg-neonFlicker {
      animation: dg-neonFlicker 3.5s ease-in-out infinite;
    }

    @keyframes dg-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }
    .dg-float {
      animation: dg-float 6s ease-in-out infinite;
    }
  </style>

  <!-- Layer 1: Sky/Background -->
  <rect width="512" height="512" fill="url(#dg-skyGrad)"/>

  <!-- Distant stars -->
  <g>
    <circle cx="80" cy="120" r="1.5" fill="#ffd700" class="dg-twinkle" filter="url(#dg-sparkleGlow)"/>
    <circle cx="150" cy="80" r="1" fill="#ff6b6b" class="dg-twinkle" style="animation-delay: 0.5s"/>
    <circle cx="220" cy="140" r="1.2" fill="#a8e6cf" class="dg-twinkle" style="animation-delay: 1s"/>
    <circle cx="350" cy="90" r="1.8" fill="#ffd700" class="dg-twinkle" style="animation-delay: 1.5s"/>
    <circle cx="420" cy="160" r="1.3" fill="#ff6b6b" class="dg-twinkle" style="animation-delay: 2s"/>
    <circle cx="480" cy="200" r="1" fill="#a8e6cf" class="dg-twinkle" style="animation-delay: 2.5s"/>
    <circle cx="100" cy="250" r="1.5" fill="#ffd700" class="dg-twinkle" style="animation-delay: 0.8s"/>
    <circle cx="300" cy="220" r="1.2" fill="#ff6b6b" class="dg-twinkle" style="animation-delay: 1.2s"/>
    <circle cx="450" cy="300" r="1.7" fill="#a8e6cf" class="dg-twinkle" style="animation-delay: 1.8s"/>
  </g>

  <!-- Layer 2: Far Background - Distant cityscape -->
  <g transform="translate(0, 50)">
    <rect x="0" y="300" width="512" height="200" fill="#1a103d" opacity="0.7"/>
    <path d="M0,350 Q100,320 200,340 T400,330 T512,350 L512,512 L0,512 Z" fill="#2a1e5d" opacity="0.8"/>

    <!-- Distant buildings -->
    <rect x="50" y="320" width="20" height="80" fill="#3a2e6d" class="dg-float" style="animation-delay: 0.3s"/>
    <rect x="120" y="310" width="25" height="90" fill="#4a3e7d" class="dg-float" style="animation-delay: 0.6s"/>
    <rect x="200" y="300" width="30" height="100" fill="#3a2e6d" class="dg-float" style="animation-delay: 0.9s"/>
    <rect x="300" y="315" width="22" height="85" fill="#4a3e7d" class="dg-float" style="animation-delay: 1.2s"/>
    <rect x="400" y="305" width="28" height="95" fill="#3a2e6d" class="dg-float" style="animation-delay: 1.5s"/>

    <!-- Distant neon signs -->
    <circle cx="130" cy="340" r="3" fill="#ffd700" class="dg-neonFlicker" filter="url(#dg-softGlow)"/>
    <circle cx="215" cy="330" r="2.5" fill="#ff6b6b" class="dg-neonFlicker" style="animation-delay: 0.5s" filter="url(#dg-softGlow)"/>
    <circle cx="310" cy="335" r="3.5" fill="#a8e6cf" class="dg-neonFlicker" style="animation-delay: 1s" filter="url(#dg-softGlow)"/>
    <circle cx="410" cy="325" r="2.8" fill="#ffd700" class="dg-neonFlicker" style="animation-delay: 1.5s" filter="url(#dg-softGlow)"/>
  </g>

  <!-- Layer 3: Mid Background - Clouds and floating elements -->
  <g>
    <!-- Clouds -->
    <g transform="translate(50, 100)" class="dg-cloudDrift">
      <path d="M0,0 Q20,-15 40,0 Q60,-20 80,0 Q90,10 70,20 Q50,30 30,20 Q10,30 0,20 Z" fill="#4a3e7d" opacity="0.6"/>
    </g>
    <g transform="translate(300, 150)" class="dg-cloudDrift" style="animation-delay: 2s">
      <path d="M0,0 Q30,-20 60,0 Q80,-25 100,0 Q110,15 90,30 Q60,40 30,30 Q10,40 0,30 Z" fill="#5a4e8d" opacity="0.7"/>
    </g>
    <g transform="translate(150, 200)" class="dg-cloudDrift" style="animation-delay: 4s">
      <path d="M0,0 Q25,-10 50,0 Q70,-15 90,0 Q100,8 80,20 Q50,25 25,20 Q5,25 0,20 Z" fill="#3a2e6d" opacity="0.5"/>
    </g>

    <!-- Floating platforms -->
    <rect x="100" y="250" width="80" height="10" rx="5" fill="#5a4e8d" opacity="0.8" class="dg-float" style="animation-delay: 0.7s"/>
    <rect x="350" y="230" width="70" height="10" rx="5" fill="#4a3e7d" opacity="0.7" class="dg-float" style="animation-delay: 1.4s"/>

    <!-- Distant floating lights -->
    <circle cx="140" cy="245" r="2" fill="#ffd700" class="dg-pulse"/>
    <circle cx="380" cy="225" r="2.5" fill="#ff6b6b" class="dg-pulse" style="animation-delay: 1s"/>
  </g>

  <!-- Layer 4: Middle Ground - City details -->
  <g>
    <!-- Buildings -->
    <rect x="150" y="300" width="40" height="120" fill="#4a3e7d" rx="5"/>
    <rect x="200" y="280" width="35" height="140" fill="#5a4e8d" rx="5"/>
    <rect x="245" y="310" width="30" height="110" fill="#4a3e7d" rx="5"/>
    <rect x="285" y="290" width="45" height="130" fill="#5a4e8d" rx="5"/>

    <!-- Neon signs -->
    <rect x="160" y="320" width="20" height="5" fill="#ffd700" class="dg-neonFlicker" filter="url(#dg-mediumGlow)"/>
    <rect x="210" y="300" width="15" height="4" fill="#ff6b6b" class="dg-neonFlicker" style="animation-delay: 0.5s" filter="url(#dg-mediumGlow)"/>
    <rect x="255" y="330" width="18" height="4" fill="#a8e6cf" class="dg-neonFlicker" style="animation-delay: 1s" filter="url(#dg-mediumGlow)"/>
    <rect x="295" y="310" width="25" height="5" fill="#ffd700" class="dg-neonFlicker" style="animation-delay: 1.5s" filter="url(#dg-mediumGlow)"/>

    <!-- Windows -->
    <rect x="160" y="340" width="8" height="8" fill="#ffd700" opacity="0.7"/>
    <rect x="175" y="360" width="8" height="8" fill="#ff6b6b" opacity="0.7"/>
    <rect x="215" y="320" width="8" height="8" fill="#a8e6cf" opacity="0.7"/>
    <rect x="230" y="350" width="8" height="8" fill="#ffd700" opacity="0.7"/>
    <rect x="260" y="340" width="8" height="8" fill="#ff6b6b" opacity="0.7"/>
    <rect x="300" y="330" width="8" height="8" fill="#a8e6cf" opacity="0.7"/>
    <rect x="315" y="360" width="8" height="8" fill="#ffd700" opacity="0.7"/>

    <!-- Floating orbs -->
    <circle cx="180" cy="270" r="4" fill="#ffd700" class="dg-float" filter="url(#dg-softGlow)"/>
    <circle cx="320" cy="260" r="5" fill="#ff6b6b" class="dg-float" style="animation-delay: 1s" filter="url(#dg-softGlow)"/>
  </g>

  <!-- Layer 5: Main Character - Drizzle -->
  <g transform="translate(256, 240)">
    <g class="dg-bob">
      <!-- Drizzle's body -->
      <path d="M0,-15 Q5,-20 10,-15 Q15,-10 10,-5 Q5,0 0,-5 Q-5,-10 -10,-15 Q-5,-20 0,-15 Z" fill="#a8e6cf" filter="url(#dg-mediumGlow)"/>

      <!-- Drizzle's glow -->
      <path d="M0,-18 Q8,-25 15,-18 Q20,-10 15,-5 Q8,0 0,-8 Q-8,-10 -15,-18 Q-8,-25 0,-18 Z" fill="white" opacity="0.3" filter="url(#dg-strongGlow)"/>

      <!-- Drizzle's eyes -->
      <circle cx="-4" cy="-10" r="2" fill="#3a2e6d"/>
      <circle cx="4" cy="-10" r="2" fill="#3a2e6d"/>
      <circle cx="-4" cy="-10" r="1" fill="white"/>
      <circle cx="4" cy="-10" r="1" fill="white"/>

      <!-- Drizzle's smile -->
      <path d="M-3,-5 Q0,-3 3,-5" stroke="#3a2e6d" stroke-width="1" fill="none"/>

      <!-- Sparkle near Drizzle -->
      <circle cx="12" cy="-20" r="1.5" fill="#ffd700" class="dg-twinkle" filter="url(#dg-sparkleGlow)"/>
    </g>
  </g>

  <!-- Layer 6: Foreground Particles/Sparkles -->
  <g>
    <!-- Floating particles -->
    <g transform="translate(50, 50)" class="dg-particleDrift">
      <circle r="1.5" fill="#ffd700" opacity="0.8"/>
    </g>
    <g transform="translate(450, 80)" class="dg-particleDrift" style="animation-delay: 1s">
      <circle r="1.2" fill="#ff6b6b" opacity="0.7"/>
    </g>
    <g transform="translate(100, 400)" class="dg-particleDrift" style="animation-delay: 2s">
      <circle r="1.8" fill="#a8e6cf" opacity="0.6"/>
    </g>
    <g transform="translate(400, 350)" class="dg-particleDrift" style="animation-delay: 3s">
      <circle r="1.3" fill="#ffd700" opacity="0.9"/>
    </g>
    <g transform="translate(200, 50)" class="dg-particleDrift" style="animation-delay: 4s">
      <circle r="1" fill="#ff6b6b" opacity="0.8"/>
    </g>

    <!-- Sparkles -->
    <path d="M100,150 L103,155 L108,155 L104,158 L106,163 L100,160 L94,163 L96,158 L92,155 L97,155 Z" fill="#ffd700" class="dg-twinkle" filter="url(#dg-sparkleGlow)"/>
    <path d="M400,120 L403,125 L408,125 L404,128 L406,133 L400,130 L394,133 L396,128 L392,125 L397,125 Z" fill="#ff6b6b" class="dg-twinkle" style="animation-delay: 0.5s" filter="url(#dg-sparkleGlow)"/>
    <path d="M300,400 L303,405 L308,405 L304,408 L306,413 L300,410 L294,413 L296,408 L292,405 L297,405 Z" fill="#a8e6cf" class="dg-twinkle" style="animation-delay: 1s" filter="url(#dg-sparkleGlow)"/>
  </g>

  <!-- Layer 7: Vignette Overlay -->
  <rect width="512" height="512" fill="url(#dg-vignette)" opacity="0.4"/>
</svg>