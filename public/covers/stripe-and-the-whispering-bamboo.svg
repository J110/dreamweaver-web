<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
    <linearGradient id="sa-skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#0a1a2a"/>
        <stop offset="50%" stop-color="#1a2a4a"/>
        <stop offset="100%" stop-color="#2a3a5a"/>
    </linearGradient>
    <radialGradient id="sa-moonGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
        <stop offset="0%" stop-color="#f8f8d0"/>
        <stop offset="100%" stop-color="#e8e8b0"/>
    </radialGradient>
    <linearGradient id="sa-bambooGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#4a6a3a"/>
        <stop offset="100%" stop-color="#2a4a2a"/>
    </linearGradient>
    <linearGradient id="sa-tigerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f8a84a"/>
        <stop offset="50%" stop-color="#f09030"/>
        <stop offset="100%" stop-color="#d88020"/>
    </linearGradient>
    <linearGradient id="sa-stripeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#3a2a1a"/>
        <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <filter id="sa-softGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="sa-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="sa-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="sa-vignette" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
        <stop offset="0%" stop-color="black" stop-opacity="0"/>
        <stop offset="100%" stop-color="black" stop-opacity="0.8"/>
    </radialGradient>
    <filter id="sa-sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
        <feSpecularLighting result="specOut" in="blur" specularConstant="1" specularExponent="20" lighting-color="#ffd700">
            <fePointLight x="0" y="0" z="200"/>
        </feSpecularLighting>
        <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
</defs>
<style>
    @keyframes sa-twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
    }
    @keyframes sa-bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    @keyframes sa-sway {
        0%, 100% { transform: rotate(-2deg); }
        50% { transform: rotate(2deg); }
    }
    @keyframes sa-drift {
        0% { transform: translate(0, 0); }
        25% { transform: translate(5px, 5px); }
        50% { transform: translate(0, 10px); }
        75% { transform: translate(-5px, 5px); }
        100% { transform: translate(0, 0); }
    }
    @keyframes sa-pulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
    }
    @keyframes sa-leaf-fall {
        0% { transform: translate(0, 0) rotate(0deg); }
        100% { transform: translate(0, 20px) rotate(360deg); }
    }
    .sa-twinkle { animation: sa-twinkle 3s ease-in-out infinite; }
    .sa-bob { animation: sa-bob 5s ease-in-out infinite; }
    .sa-sway { animation: sa-sway 7s ease-in-out infinite; }
    .sa-drift { animation: sa-drift 8s ease-in-out infinite; }
    .sa-pulse { animation: sa-pulse 4s ease-in-out infinite; }
    .sa-leaf-fall { animation: sa-leaf-fall 6s ease-in-out infinite; }
    .sa-leaf-fall:nth-child(2n) { animation-delay: -2s; }
    .sa-leaf-fall:nth-child(3n) { animation-delay: -4s; }
</style>
<g>
    <!-- Layer 1: Sky/Background -->
    <rect width="512" height="512" fill="url(#sa-skyGrad)"/>
    <circle cx="100" cy="100" r="40" fill="url(#sa-moonGrad)" filter="url(#sa-softGlow)"/>
    <circle cx="120" cy="80" r="3" fill="#ffd700" class="sa-twinkle"/>
    <circle cx="400" cy="60" r="2" fill="#ffd700" class="sa-twinkle"/>
    <circle cx="300" cy="120" r="2.5" fill="#ffd700" class="sa-twinkle"/>
    <circle cx="180" cy="40" r="2" fill="#ffd700" class="sa-twinkle"/>
    <circle cx="450" cy="150" r="2.2" fill="#ffd700" class="sa-twinkle"/>
    <circle cx="250" cy="90" r="1.8" fill="#ffd700" class="sa-twinkle"/>

    <!-- Layer 2: Far Background -->
    <g transform="translate(0, 350)">
        <rect width="512" height="162" fill="#1a2a3a"/>
        <path d="M0,100 Q100,80 200,90 T400,85 T512,95 L512,162 L0,162 Z" fill="#2a3a4a"/>
        <path d="M0,120 Q150,100 300,110 T512,115 L512,162 L0,162 Z" fill="#3a4a5a"/>
    </g>

    <!-- Layer 3: Mid Background -->
    <g transform="translate(0, 300)">
        <rect width="512" height="212" fill="#2a4a3a"/>
        <g class="sa-sway">
            <path d="M50,150 Q100,130 150,140 Q200,150 250,145 Q300,140 350,150 Q400,160 450,155 Q500,150 512,160 L512,212 L0,212 Z" fill="#3a5a4a"/>
        </g>
        <g transform="translate(100, 100)">
            <ellipse cx="0" cy="50" rx="80" ry="30" fill="#4a6a5a" opacity="0.7"/>
        </g>
        <g transform="translate(350, 80)">
            <ellipse cx="0" cy="70" rx="100" ry="40" fill="#4a6a5a" opacity="0.6"/>
        </g>
    </g>

    <!-- Layer 4: Middle Ground -->
    <g>
        <g transform="translate(50, 250)">
            <g class="sa-sway">
                <rect x="-5" y="0" width="10" height="150" fill="url(#sa-bambooGrad)"/>
                <path d="M-10,20 Q0,10 10,20 Q0,30 -10,20 Z" fill="#5a7a4a"/>
                <path d="M-8,50 Q0,40 8,50 Q0,60 -8,50 Z" fill="#6a8a5a"/>
                <path d="M-6,80 Q0,70 6,80 Q0,90 -6,80 Z" fill="#7a9a6a"/>
            </g>
        </g>
        <g transform="translate(400, 230)">
            <g class="sa-sway">
                <rect x="-8" y="0" width="16" height="170" fill="url(#sa-bambooGrad)"/>
                <path d="M-15,30 Q0,20 15,30 Q0,40 -15,30 Z" fill="#5a7a4a"/>
                <path d="M-12,70 Q0,60 12,70 Q0,80 -12,70 Z" fill="#6a8a5a"/>
                <path d="M-10,110 Q0,100 10,110 Q0,120 -10,110 Z" fill="#7a9a6a"/>
            </g>
        </g>
        <g transform="translate(200, 280)">
            <g class="sa-sway">
                <rect x="-6" y="0" width="12" height="120" fill="url(#sa-bambooGrad)"/>
                <path d="M-12,15 Q0,5 12,15 Q0,25 -12,15 Z" fill="#5a7a4a"/>
                <path d="M-9,45 Q0,35 9,45 Q0,55 -9,45 Z" fill="#6a8a5a"/>
            </g>
        </g>
        <g transform="translate(300, 260)">
            <g class="sa-sway">
                <rect x="-7" y="0" width="14" height="140" fill="url(#sa-bambooGrad)"/>
                <path d="M-14,25 Q0,15 14,25 Q0,35 -14,25 Z" fill="#5a7a4a"/>
                <path d="M-11,65 Q0,55 11,65 Q0,75 -11,65 Z" fill="#6a8a5a"/>
            </g>
        </g>
    </g>

    <!-- Layer 5: Main Character -->
    <g transform="translate(256, 240)">
        <g class="sa-bob">
            <ellipse cx="0" cy="50" rx="40" ry="25" fill="url(#sa-tigerGrad)" filter="url(#sa-softGlow)"/>
            <path d="M-30,40 Q-20,30 0,35 Q20,30 30,40 Q20,50 0,45 Q-20,50 -30,40 Z" fill="url(#sa-tigerGrad)"/>
            <ellipse cx="-15" cy="35" rx="8" ry="6" fill="#f8f8d0"/>
            <ellipse cx="15" cy="35" rx="8" ry="6" fill="#f8f8d0"/>
            <circle cx="-15" cy="35" r="3" fill="#2a2a2a"/>
            <circle cx="15" cy="35" r="3" fill="#2a2a2a"/>
            <path d="M-5,45 Q0,50 5,45" stroke="#2a2a2a" stroke-width="2" fill="none"/>
            <path d="M-25,45 L-20,55 L-15,45" fill="url(#sa-stripeGrad)"/>
            <path d="M-15,40 L-10,50 L-5,40" fill="url(#sa-stripeGrad)"/>
            <path d="M5,40 L10,50 L15,40" fill="url(#sa-stripeGrad)"/>
            <path d="M15,45 L20,55 L25,45" fill="url(#sa-stripeGrad)"/>
            <path d="M-35,30 L-30,40 L-25,30" fill="url(#sa-stripeGrad)"/>
            <path d="M35,30 L30,40 L25,30" fill="url(#sa-stripeGrad)"/>
            <path d="M0,20 Q-5,15 0,10 Q5,15 0,20 Z" fill="#f8a84a"/>
            <path d="M-10,25 L0,20 L10,25 L0,30 Z" fill="url(#sa-tigerGrad)"/>
        </g>
    </g>

    <!-- Layer 6: Foreground Particles/Sparkles -->
    <g>
        <g transform="translate(150, 100)" class="sa-drift">
            <circle cx="0" cy="0" r="2" fill="#ffd700" filter="url(#sa-sparkleGlow)" class="sa-pulse"/>
        </g>
        <g transform="translate(350, 120)" class="sa-drift">
            <circle cx="0" cy="0" r="1.5" fill="#ffd700" filter="url(#sa-sparkleGlow)" class="sa-pulse"/>
        </g>
        <g transform="translate(200, 80)" class="sa-drift">
            <circle cx="0" cy="0" r="2.5" fill="#ffd700" filter="url(#sa-sparkleGlow)" class="sa-pulse"/>
        </g>
        <g transform="translate(400, 50)" class="sa-drift">
            <circle cx="0" cy="0" r="1.8" fill="#ffd700" filter="url(#sa-sparkleGlow)" class="sa-pulse"/>
        </g>
        <g transform="translate(100, 150)" class="sa-drift">
            <circle cx="0" cy="0" r="2" fill="#ffd700" filter="url(#sa-sparkleGlow)" class="sa-pulse"/>
        </g>
        <g transform="translate(300, 200)" class="sa-leaf-fall">
            <path d="M0,0 Q5,-5 10,0 Q5,5 0,0 Z" fill="#5a7a4a" opacity="0.8"/>
        </g>
        <g transform="translate(150, 220)" class="sa-leaf-fall">
            <path d="M0,0 Q-5,-3 0,-6 Q5,-3 0,0 Z" fill="#6a8a5a" opacity="0.7"/>
        </g>
        <g transform="translate(450, 180)" class="sa-leaf-fall">
            <path d="M0,0 Q3,-4 6,-2 Q3,0 0,0 Z" fill="#7a9a6a" opacity="0.6"/>
        </g>
    </g>

    <!-- Layer 7: Vignette Overlay -->
    <rect width="512" height="512" fill="url(#sa-vignette)" opacity="0.4"/>
</g>
</svg>