<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
    <radialGradient id="tt-skyGrad" cx="50%" cy="50%" r="70%">
        <stop offset="0%" stop-color="#0a0e2a"/>
        <stop offset="50%" stop-color="#1a103d"/>
        <stop offset="100%" stop-color="#0a0e2a"/>
    </radialGradient>

    <linearGradient id="tt-moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f8f8ff"/>
        <stop offset="100%" stop-color="#d4d4ff"/>
    </linearGradient>

    <linearGradient id="tt-pathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#5a3921"/>
        <stop offset="50%" stop-color="#8b4513"/>
        <stop offset="100%" stop-color="#5a3921"/>
    </linearGradient>

    <filter id="tt-softGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="tt-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="tt-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <radialGradient id="tt-vignette" cx="50%" cy="50%" r="70%">
        <stop offset="0%" stop-color="black" stop-opacity="0"/>
        <stop offset="100%" stop-color="black" stop-opacity="1"/>
    </radialGradient>

    <filter id="tt-fireflyGlow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
        <feSpecularLighting result="specOut" in="blur" specularConstant="1" specularExponent="20" lighting-color="#ffd700">
            <fePointLight x="0" y="0" z="200"/>
        </feSpecularLighting>
        <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    <filter id="tt-leafGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
        <feSpecularLighting result="specOut" in="blur" specularConstant="0.8" specularExponent="15" lighting-color="#7cfc00">
            <fePointLight x="0" y="0" z="100"/>
        </feSpecularLighting>
        <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="0.5" k4="0"/>
    </filter>
</defs>

<style>
    @keyframes tt-starTwinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
    }
    .tt-starTwinkle { animation: tt-starTwinkle 3s ease-in-out infinite; }

    @keyframes tt-moonPulse {
        0%, 100% { filter: url(#tt-softGlow); }
        50% { filter: url(#tt-mediumGlow); }
    }
    .tt-moonPulse { animation: tt-moonPulse 5s ease-in-out infinite; }

    @keyframes tt-characterBob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
    }
    .tt-characterBob { animation: tt-characterBob 6s ease-in-out infinite; }

    @keyframes tt-fireflyFloat {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(5px, -3px) rotate(5deg); }
        50% { transform: translate(0, -6px) rotate(0deg); }
        75% { transform: translate(-5px, -3px) rotate(-5deg); }
    }
    .tt-fireflyFloat { animation: tt-fireflyFloat 8s ease-in-out infinite; }

    @keyframes tt-leafSway {
        0%, 100% { transform: rotate(-2deg); }
        50% { transform: rotate(2deg); }
    }
    .tt-leafSway { animation: tt-leafSway 7s ease-in-out infinite; }

    @keyframes tt-particleDrift {
        0% { transform: translate(0, 0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translate(0, 20px); opacity: 0; }
    }
    .tt-particleDrift { animation: tt-particleDrift 9s ease-in-out infinite; }

    @keyframes tt-pathGlow {
        0%, 100% { filter: url(#tt-softGlow); }
        50% { filter: none; }
    }
    .tt-pathGlow { animation: tt-pathGlow 4s ease-in-out infinite; }

    @keyframes tt-cloudDrift {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(10px); }
    }
    .tt-cloudDrift { animation: tt-cloudDrift 12s ease-in-out infinite; }
</style>

<!-- Layer 1: Sky/Background -->
<rect width="512" height="512" fill="url(#tt-skyGrad)"/>
<circle cx="400" cy="100" r="30" fill="url(#tt-moonGrad)" class="tt-moonPulse"/>
<circle cx="100" cy="80" r="1" fill="white" class="tt-starTwinkle"/>
<circle cx="150" cy="60" r="1.2" fill="white" class="tt-starTwinkle" style="animation-delay: 0.5s"/>
<circle cx="200" cy="120" r="1" fill="white" class="tt-starTwinkle" style="animation-delay: 1s"/>
<circle cx="300" cy="70" r="1.3" fill="white" class="tt-starTwinkle" style="animation-delay: 1.5s"/>
<circle cx="450" cy="150" r="1.1" fill="white" class="tt-starTwinkle" style="animation-delay: 2s"/>
<circle cx="50" cy="200" r="0.8" fill="white" class="tt-starTwinkle" style="animation-delay: 2.5s"/>

<!-- Layer 2: Far Background -->
<ellipse cx="256" cy="400" rx="300" ry="80" fill="#0a2e1a" opacity="0.8"/>
<ellipse cx="100" cy="350" rx="150" ry="50" fill="#0d3a22" opacity="0.7"/>
<ellipse cx="400" cy="380" rx="120" ry="40" fill="#0d3a22" opacity="0.6"/>

<!-- Clouds -->
<g transform="translate(50, 50)" class="tt-cloudDrift">
    <path d="M0,30 Q10,10 30,20 Q50,5 70,20 Q90,10 100,30 Q80,40 60,40 Q40,50 20,40 Q0,40 0,30 Z" fill="white" opacity="0.6"/>
</g>
<g transform="translate(350, 80)" class="tt-cloudDrift" style="animation-delay: 2s">
    <path d="M0,20 Q15,5 40,15 Q60,0 80,15 Q100,5 110,20 Q90,30 70,30 Q50,40 30,30 Q10,30 0,20 Z" fill="white" opacity="0.5"/>
</g>

<!-- Layer 3: Mid Background -->
<path d="M0,350 Q100,320 200,340 Q300,360 400,330 Q500,310 512,350 L512,512 L0,512 Z" fill="#1a4a32"/>
<path d="M50,380 Q150,360 250,370 Q350,380 450,360 L450,512 L50,512 Z" fill="#2a5a42"/>

<!-- Trees -->
<g transform="translate(50, 250)">
    <polygon points="0,50 20,0 40,50" fill="#3a7a52"/>
    <polygon points="5,40 20,10 35,40" fill="#4a8a62"/>
    <rect x="18" y="50" width="4" height="30" fill="#5a3921"/>
</g>
<g transform="translate(150, 220)">
    <polygon points="0,80 30,0 60,80" fill="#3a7a52"/>
    <polygon points="10,60 30,20 50,60" fill="#4a8a62"/>
    <rect x="28" y="80" width="4" height="40" fill="#5a3921"/>
</g>
<g transform="translate(350, 240)">
    <polygon points="0,60 25,0 50,60" fill="#3a7a52"/>
    <polygon points="5,50 25,10 45,50" fill="#4a8a62"/>
    <rect x="23" y="60" width="4" height="35" fill="#5a3921"/>
</g>
<g transform="translate(450, 230)">
    <polygon points="0,70 20,0 40,70" fill="#3a7a52"/>
    <polygon points="5,60 20,10 35,60" fill="#4a8a62"/>
    <rect x="18" y="70" width="4" height="30" fill="#5a3921"/>
</g>

<!-- Layer 4: Middle Ground -->
<path d="M100,400 Q200,380 300,400 Q400,420 512,400 L512,512 L0,512 Z" fill="#3a5a42"/>
<path d="M0,450 Q150,430 256,440 Q350,450 512,430 L512,512 L0,512 Z" fill="#4a6a52" opacity="0.8"/>

<!-- Path -->
<path d="M150,420 Q256,400 360,420" stroke="url(#tt-pathGrad)" stroke-width="8" fill="none" stroke-linecap="round" class="tt-pathGlow"/>

<!-- Mushrooms -->
<g transform="translate(120, 400)">
    <ellipse cx="0" cy="-5" rx="12" ry="5" fill="#ff6b6b"/>
    <rect x="-2" y="-5" width="4" height="10" fill="#f8f8f8"/>
    <circle cx="-6" cy="-8" r="2" fill="white" opacity="0.8"/>
    <circle cx="6" cy="-7" r="1.5" fill="white" opacity="0.8"/>
</g>
<g transform="translate(200, 410)">
    <ellipse cx="0" cy="-8" rx="15" ry="6" fill="#ffd700"/>
    <rect x="-3" y="-8" width="6" height="12" fill="#f8f8f8"/>
    <circle cx="-8" cy="-10" r="2.5" fill="white" opacity="0.8"/>
</g>
<g transform="translate(300, 405)">
    <ellipse cx="0" cy="-6" rx="10" ry="4" fill="#ff6b6b"/>
    <rect x="-2" y="-6" width="4" height="8" fill="#f8f8f8"/>
</g>

<!-- Layer 5: Main Character -->
<g transform="translate(256, 240)">
    <g class="tt-characterBob">
        <!-- Tick the pocket watch -->
        <circle cx="0" cy="0" r="30" fill="#f8f8ff" filter="url(#tt-softGlow)"/>
        <circle cx="0" cy="0" r="25" fill="#d4d4ff"/>
        <circle cx="0" cy="0" r="20" fill="#b8b8ff"/>

        <!-- Watch hands -->
        <line x1="0" y1="0" x2="0" y2="-15" stroke="#333" stroke-width="2" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="12" y2="-9" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>

        <!-- Watch details -->
        <circle cx="0" cy="0" r="3" fill="#ffd700"/>
        <path d="M0,-25 A25,25 0 0,1 0,25" stroke="#5a3921" stroke-width="2" fill="none"/>
        <path d="M-20,0 A20,20 0 0,1 20,0" stroke="#5a3921" stroke-width="2" fill="none"/>

        <!-- Watch chain -->
        <path d="M-15,15 Q-25,25 -20,35 Q-10,45 0,40" stroke="#ffd700" stroke-width="2" fill="none"/>
        <circle cx="-20" cy="35" r="3" fill="#ffd700"/>

        <!-- Face -->
        <circle cx="-8" cy="-5" r="2" fill="#333"/>
        <circle cx="8" cy="-5" r="2" fill="#333"/>
        <path d="M-5,5 Q0,10 5,5" stroke="#333" stroke-width="1.5" fill="none"/>
    </g>
</g>

<!-- Firefly -->
<g transform="translate(300, 200)">
    <g class="tt-fireflyFloat">
        <circle cx="0" cy="0" r="4" fill="#ffd700" filter="url(#tt-fireflyGlow)"/>
        <ellipse cx="0" cy="0" rx="2" ry="6" fill="#ffd700" opacity="0.7"/>
        <circle cx="-2" cy="-2" r="1" fill="white"/>
    </g>
</g>

<!-- Layer 6: Foreground Particles/Sparkles -->
<g transform="translate(100, 150)">
    <circle cx="0" cy="0" r="1.5" fill="white" class="tt-particleDrift" style="animation-delay: 0s"/>
</g>
<g transform="translate(150, 100)">
    <circle cx="0" cy="0" r="1.2" fill="white" class="tt-particleDrift" style="animation-delay: 1s"/>
</g>
<g transform="translate(200, 180)">
    <circle cx="0" cy="0" r="1" fill="#ffd700" class="tt-particleDrift" style="animation-delay: 2s"/>
</g>
<g transform="translate(350, 120)">
    <circle cx="0" cy="0" r="1.3" fill="white" class="tt-particleDrift" style="animation-delay: 3s"/>
</g>
<g transform="translate(400, 160)">
    <circle cx="0" cy="0" r="1.1" fill="#ffd700" class="tt-particleDrift" style="animation-delay: 4s"/>
</g>
<g transform="translate(450, 200)">
    <circle cx="0" cy="0" r="1.4" fill="white" class="tt-particleDrift" style="animation-delay: 5s"/>
</g>

<!-- Leaves -->
<g transform="translate(50, 300)">
    <g class="tt-leafSway">
        <path d="M0,0 Q10,-10 20,0 Q10,10 0,0" fill="#7cfc00" filter="url(#tt-leafGlow)"/>
    </g>
</g>
<g transform="translate(100, 280)">
    <g class="tt-leafSway" style="animation-delay: 1s">
        <path d="M0,0 Q8,-8 16,0 Q8,8 0,0" fill="#7cfc00" filter="url(#tt-leafGlow)"/>
    </g>
</g>
<g transform="translate(400, 290)">
    <g class="tt-leafSway" style="animation-delay: 2s">
        <path d="M0,0 Q12,-12 24,0 Q12,12 0,0" fill="#7cfc00" filter="url(#tt-leafGlow)"/>
    </g>
</g>
<g transform="translate(450, 320)">
    <g class="tt-leafSway" style="animation-delay: 3s">
        <path d="M0,0 Q6,-6 12,0 Q6,6 0,0" fill="#7cfc00" filter="url(#tt-leafGlow)"/>
    </g>
</g>

<!-- Layer 7: Vignette Overlay -->
<rect width="512" height="512" fill="url(#tt-vignette)" opacity="0.4"/>
</svg>