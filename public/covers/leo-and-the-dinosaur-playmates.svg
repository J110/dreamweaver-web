<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="la-skyGrad" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#0a0e2a"/>
    <stop offset="50%" stop-color="#1a103d"/>
    <stop offset="100%" stop-color="#0a0e2a"/>
  </radialGradient>

  <linearGradient id="la-treeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#3a5f4f"/>
    <stop offset="100%" stop-color="#2a4a3a"/>
  </linearGradient>

  <linearGradient id="la-dinoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#5a9f8a"/>
    <stop offset="100%" stop-color="#3a7a6a"/>
  </linearGradient>

  <linearGradient id="la-glowGold" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#ffcc00" stop-opacity="0.4"/>
  </linearGradient>

  <filter id="la-softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>

  <filter id="la-mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>

  <filter id="la-strongGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>

  <radialGradient id="la-vignette" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
  </radialGradient>

  <filter id="la-sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
    <feSpecularLighting result="specOut" in="blur" specularConstant="1" specularExponent="20" lighting-color="#ffd700">
      <fePointLight x="0" y="0" z="200"/>
    </feSpecularLighting>
    <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
  </filter>
</defs>

<style>
  @keyframes la-twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }
  .la-twinkle { animation: la-twinkle 3s ease-in-out infinite; }

  @keyframes la-bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .la-bob { animation: la-bob 5s ease-in-out infinite; }

  @keyframes la-cloudDrift {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(20px); }
  }
  .la-cloudDrift { animation: la-cloudDrift 8s ease-in-out infinite; }

  @keyframes la-leafFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
  }
  .la-leafFloat { animation: la-leafFloat 6s ease-in-out infinite; }

  @keyframes la-particleDrift {
    0% { transform: translate(0, 0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translate(30px, -20px); opacity: 0; }
  }
  .la-particleDrift { animation: la-particleDrift 9s ease-in-out infinite; }

  @keyframes la-pulseGlow {
    0%, 100% { filter: url(#la-softGlow); }
    50% { filter: url(#la-mediumGlow); }
  }
  .la-pulseGlow { animation: la-pulseGlow 4s ease-in-out infinite; }

  @keyframes la-dinoTailWag {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(10deg); }
  }
  .la-dinoTailWag { animation: la-dinoTailWag 7s ease-in-out infinite; }

  @keyframes la-treeSway {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }
  .la-treeSway { animation: la-treeSway 10s ease-in-out infinite; }
</style>

<!-- Layer 1: Sky/Background -->
<rect width="512" height="512" fill="url(#la-skyGrad)"/>
<circle cx="100" cy="80" r="2" fill="#ffffff" class="la-twinkle"/>
<circle cx="400" cy="60" r="1.5" fill="#ffffff" class="la-twinkle" style="animation-delay: 0.5s"/>
<circle cx="200" cy="40" r="1.8" fill="#ffffff" class="la-twinkle" style="animation-delay: 1s"/>
<circle cx="350" cy="120" r="2.2" fill="#ffffff" class="la-twinkle" style="animation-delay: 1.5s"/>
<circle cx="150" cy="150" r="1.5" fill="#ffffff" class="la-twinkle" style="animation-delay: 2s"/>
<circle cx="450" cy="200" r="2" fill="#ffffff" class="la-twinkle" style="animation-delay: 2.5s"/>

<!-- Layer 2: Far Background -->
<g class="la-cloudDrift">
  <path d="M50,150 Q80,130 110,150 Q140,170 170,150 Q200,130 230,150 L230,180 Q200,200 170,180 Q140,160 110,180 Q80,200 50,180 Z" fill="#a8c8ec" opacity="0.6"/>
</g>
<g class="la-cloudDrift" style="animation-delay: 2s">
  <path d="M350,100 Q380,80 410,100 Q440,120 470,100 Q500,80 530,100 L530,130 Q500,150 470,130 Q440,110 410,130 Q380,150 350,130 Z" fill="#a8c8ec" opacity="0.6"/>
</g>

<!-- Layer 3: Mid Background -->
<g transform="translate(100, 250)">
  <g class="la-treeSway">
    <path d="M0,0 L20,-100 L40,0 Z" fill="#3a5f4f"/>
    <path d="M10,-80 L30,-180 L50,-80 Z" fill="#2a4a3a"/>
    <path d="M20,-160 L40,-260 L60,-160 Z" fill="#1a3a2a"/>
    <ellipse cx="30" cy="-280" rx="25" ry="15" fill="#3a5f4f"/>
  </g>
</g>

<g transform="translate(400, 280)">
  <g class="la-treeSway" style="animation-delay: 1s">
    <path d="M0,0 L15,-80 L30,0 Z" fill="#3a5f4f"/>
    <path d="M5,-60 L25,-140 L45,-60 Z" fill="#2a4a3a"/>
    <ellipse cx="25" cy="-160" rx="20" ry="12" fill="#3a5f4f"/>
  </g>
</g>

<!-- Layer 4: Middle Ground -->
<g transform="translate(150, 300)">
  <ellipse cx="0" cy="0" rx="120" ry="40" fill="#2a4a3a" opacity="0.7"/>
  <path d="M-120,0 Q-60,-30 0,0 Q60,-30 120,0 Q60,30 0,0 Q-60,30 -120,0 Z" fill="#1a3a2a"/>
</g>

<g transform="translate(350, 320)">
  <ellipse cx="0" cy="0" rx="80" ry="30" fill="#2a4a3a" opacity="0.7"/>
  <path d="M-80,0 Q-40,-20 0,0 Q40,-20 80,0 Q40,20 0,0 Q-40,20 -80,0 Z" fill="#1a3a2a"/>
</g>

<!-- Treehouse -->
<g transform="translate(256, 200)">
  <rect x="-40" y="-30" width="80" height="60" fill="#8B4513" rx="5"/>
  <rect x="-35" y="-25" width="70" height="50" fill="#A0522D" rx="3"/>
  <path d="M-50,-30 L-40,-50 L40,-50 L50,-30 Z" fill="#8B4513"/>
  <rect x="-30" y="30" width="60" height="10" fill="#8B4513"/>
  <circle cx="-20" cy="-10" r="3" fill="#ffd700" class="la-twinkle"/>
  <circle cx="20" cy="-15" r="2.5" fill="#ffd700" class="la-twinkle" style="animation-delay: 1s"/>
  <path d="M-40,0 L-50,20 L-30,20 Z" fill="#8B4513"/>
  <path d="M40,0 L50,20 L30,20 Z" fill="#8B4513"/>
</g>

<!-- Layer 5: Main Character -->
<!-- Leo -->
<g transform="translate(256, 240)">
  <g class="la-bob">
    <circle cx="0" cy="-40" r="15" fill="#f8d4a3"/>
    <path d="M-10,-35 Q0,-45 10,-35 Q15,-25 10,-15 Q0,-5 -10,-15 Q-15,-25 -10,-35 Z" fill="#f8d4a3"/>
    <circle cx="-5" cy="-45" r="2" fill="#333"/>
    <circle cx="5" cy="-45" r="2" fill="#333"/>
    <path d="M-3,-38 Q0,-35 3,-38" stroke="#333" stroke-width="1" fill="none"/>
    <rect x="-8" y="-25" width="16" height="20" fill="#6a8e9a"/>
    <rect x="-10" y="-5" width="20" height="25" fill="#3a5a7a"/>
    <rect x="-12" y="20" width="8" height="15" fill="#5a7a9a"/>
    <rect x="4" y="20" width="8" height="15" fill="#5a7a9a"/>
    <path d="M-10,15 Q-5,20 0,15" stroke="#333" stroke-width="1" fill="none"/>
  </g>
</g>

<!-- Dinosaurs -->
<g transform="translate(180, 280)">
  <g class="la-bob" style="animation-delay: 1s">
    <path d="M0,-20 Q10,-30 20,-20 Q30,-10 20,0 Q10,10 0,0 Q-10,10 -20,0 Q-30,-10 -20,-20 Q-10,-30 0,-20 Z" fill="url(#la-dinoGrad)"/>
    <circle cx="0" cy="-25" r="8" fill="url(#la-dinoGrad)"/>
    <path d="M-5,-30 Q0,-35 5,-30" stroke="#333" stroke-width="1" fill="none"/>
    <circle cx="-3" cy="-28" r="1.5" fill="#333"/>
    <path d="M15,-15 L30,-25 L25,-10 Z" fill="url(#la-dinoGrad)"/>
    <path d="M-15,0 Q-25,-10 -35,0 Q-25,10 -15,0 Z" fill="url(#la-dinoGrad)" class="la-dinoTailWag"/>
    <path d="M5,-15 L10,-20 L15,-15" stroke="#333" stroke-width="0.5" fill="none"/>
  </g>
</g>

<g transform="translate(330, 290)">
  <g class="la-bob" style="animation-delay: 2s">
    <path d="M0,-15 Q8,-25 16,-15 Q24,-5 16,5 Q8,15 0,5 Q-8,15 -16,5 Q-24,-5 -16,-15 Q-8,-25 0,-15 Z" fill="#7a9f8a"/>
    <circle cx="0" cy="-20" r="6" fill="#7a9f8a"/>
    <path d="M-4,-25 Q0,-30 4,-25" stroke="#333" stroke-width="1" fill="none"/>
    <circle cx="-2" cy="-23" r="1" fill="#333"/>
    <path d="M12,-10 L25,-20 L20,-5 Z" fill="#7a9f8a"/>
    <path d="M-12,5 Q-20,-5 -30,5 Q-20,15 -12,5 Z" fill="#7a9f8a" class="la-dinoTailWag" style="animation-delay: 1s"/>
  </g>
</g>

<!-- Layer 6: Foreground Particles/Sparkles -->
<g class="la-particleDrift">
  <circle cx="50" cy="50" r="2" fill="#ffd700" filter="url(#la-sparkleGlow)"/>
</g>
<g class="la-particleDrift" style="animation-delay: 1s">
  <circle cx="450" cy="80" r="1.5" fill="#ffcc00" filter="url(#la-sparkleGlow)"/>
</g>
<g class="la-particleDrift" style="animation-delay: 2s">
  <circle cx="100" cy="400" r="2.5" fill="#ffd700" filter="url(#la-sparkleGlow)"/>
</g>
<g class="la-particleDrift" style="animation-delay: 3s">
  <circle cx="400" cy="350" r="1.8" fill="#ffcc00" filter="url(#la-sparkleGlow)"/>
</g>
<g class="la-particleDrift" style="animation-delay: 4s">
  <circle cx="200" cy="100" r="2" fill="#ffd700" filter="url(#la-sparkleGlow)"/>
</g>
<g class="la-particleDrift" style="animation-delay: 5s">
  <circle cx="300" cy="450" r="1.5" fill="#ffcc00" filter="url(#la-sparkleGlow)"/>
</g>

<!-- Glowing elements -->
<g transform="translate(256, 200)" class="la-pulseGlow">
  <circle cx="0" cy="-50" r="15" fill="url(#la-glowGold)" opacity="0.7"/>
</g>

<!-- Layer 7: Vignette Overlay -->
<rect width="512" height="512" fill="url(#la-vignette)" opacity="0.4"/>
</svg>